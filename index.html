<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plate Studio</title>
  <style>
    :root {
      color-scheme: dark;
      --space-1: 8px;
      --space-2: 16px;
      --space-3: 24px;
      --radius: 8px;
      --radius-sm: 6px;
      --panel: #12151b;
      --panel-soft: #1a202a;
      --body-bg: #0c1017;
      --view-bg: #0f131a;
      --panel-bg: linear-gradient(180deg, #141922, #10141b);
      --section-bg: rgba(255, 255, 255, .045);
      --control-bg: rgba(255, 255, 255, .055);
      --control-bg-hover: rgba(255, 255, 255, .085);
      --button-bg: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.045));
      --canvas-shadow: 0 18px 50px rgba(0, 0, 0, .32);
      --line: rgba(255, 255, 255, .12);
      --text: #eef3f7;
      --label: #dbe4ec;
      --muted: #99a4af;
      --accent: #0a84ff;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, .24);
      --shadow-md: 0 18px 44px rgba(0, 0, 0, .28);
    }

    body.light {
      color-scheme: light;
      --panel: #ffffff;
      --panel-soft: #f5f5f7;
      --body-bg: #ffffff;
      --view-bg: #ffffff;
      --panel-bg: linear-gradient(180deg, #fbfbfd, #f5f5f7);
      --section-bg: rgba(255, 255, 255, .82);
      --control-bg: #f5f5f7;
      --control-bg-hover: #ffffff;
      --button-bg: linear-gradient(180deg, #ffffff, #f2f2f5);
      --canvas-shadow: 0 18px 50px rgba(20, 33, 45, .12);
      --line: rgba(0, 0, 0, .1);
      --text: #1d1d1f;
      --label: #2b2b2f;
      --muted: #6e6e73;
      --accent: #0a84ff;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, .05);
      --shadow-md: 0 18px 44px rgba(20, 33, 45, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--body-bg);
    }

    .app-shell {
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr);
      width: 100%;
      height: 100%;
    }

    .top-toolbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      padding: var(--space-1) var(--space-2);
      background: var(--panel-bg);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(24px);
    }

    .brand {
      display: flex;
      gap: var(--space-1);
      align-items: center;
      min-width: 188px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: radial-gradient(circle at 35% 30%, #ffffff, rgba(254, 229, 0, .78) 36%, rgba(255, 119, 0, .55) 70%);
      box-shadow: var(--shadow-sm);
    }

    .brand h1 {
      margin: 0;
      font-size: 13px;
      line-height: 1.1;
      font-weight: 700;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .toolbar-actions {
      display: flex;
      gap: var(--space-1);
      align-items: center;
      justify-content: flex-end;
    }

    .toolbar-actions button,
    .top-toolbar button {
      width: auto;
      min-width: 76px;
    }

    .toolbar-actions .theme-toggle {
      min-width: 54px;
      opacity: .82;
    }

    .primary-action {
      color: #ffffff;
      border-color: color-mix(in srgb, var(--accent) 68%, transparent);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, #ffffff 8%), color-mix(in srgb, var(--accent) 78%, #000000 22%));
      box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .app-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }

    .center-column {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      background: var(--view-bg);
    }

    .panel {
      overflow-y: auto;
      padding: var(--space-3) var(--space-2);
      background: var(--panel-bg);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(24px);
    }

    .panel.right-panel {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .right-panel {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: var(--space-2);
      padding: var(--space-2);
    }

    .inspector-canvas .section {
      margin-bottom: 0;
    }

    .inspector-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--section-bg);
    }

    .inspector-tab {
      min-width: 0;
      min-height: 28px;
      padding: 4px 5px;
      border: 0;
      border-radius: var(--radius-sm);
      color: var(--muted);
      background: transparent;
      font-size: 11px;
      font-weight: 650;
    }

    .inspector-tab.is-active {
      color: var(--text);
      background: var(--button-bg);
      box-shadow: var(--shadow-sm);
    }

    .inspector-content {
      min-height: 0;
      overflow-y: auto;
      padding-right: 2px;
    }

    .inspector-panel {
      display: none;
    }

    .inspector-panel.is-active {
      display: block;
    }

    .control-group {
      margin: 0 0 10px;
    }

    .control-group-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .advanced-group {
      margin-top: var(--space-2);
      padding-top: var(--space-2);
      border-top: 1px solid var(--line);
    }

    .advanced-group .control-group-title {
      margin-bottom: var(--space-1);
    }

    .panel-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      margin: 0 0 16px;
    }

    .panel-copy {
      min-width: 0;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 650;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .theme-toggle {
      width: auto;
      min-width: 54px;
      min-height: 30px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .top-toolbar .select-row,
    .top-toolbar .number-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      margin: 0;
    }

    .top-toolbar .select-row label,
    .top-toolbar .number-row label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .top-toolbar select,
    .top-toolbar input[type="number"] {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .section {
      margin: 0 0 var(--space-2);
      padding: var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--section-bg);
      box-shadow: var(--shadow-sm);
    }

    .section h2 {
      margin: 0 0 var(--space-2);
      font-size: 13px;
      letter-spacing: 0;
      font-weight: 650;
    }

    .subhead {
      margin: var(--space-2) 0 var(--space-1);
      padding-top: var(--space-1);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .section h2 + .subhead {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-1);
      align-items: center;
      margin: var(--space-1) 0;
    }

    .control label {
      min-width: 0;
      font-size: 12px;
      color: var(--label);
      overflow-wrap: anywhere;
    }

    .value {
      width: 78px;
      min-height: 26px;
      text-align: right;
      font-size: 11px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 3px 6px;
      font-family: inherit;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      accent-color: var(--accent);
      height: 18px;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 36%, var(--line));
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 16px;
      height: 16px;
      margin-top: -6.5px;
      border: 0;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
      appearance: none;
    }

    input[type="range"] {
      appearance: none;
      background: transparent;
    }

    input[type="color"] {
      width: 42px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: transparent;
    }

    input[type="text"],
    input[type="number"] {
      min-width: 0;
      min-height: 30px;
      color: var(--text);
      background: var(--control-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      font: inherit;
      font-size: 12px;
    }

    input[type="text"] {
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-width: 0;
      min-height: 30px;
      color: var(--text);
      background: var(--control-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      font: inherit;
      font-size: 12px;
    }

    .ui-row,
    .select-row,
    .number-row,
    .check-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.08fr);
      gap: var(--space-1);
      align-items: center;
      margin: var(--space-1) 0;
    }

    .ui-row label,
    .select-row label,
    .number-row label,
    .check-row label {
      min-width: 0;
      font-size: 12px;
      color: var(--label);
      overflow-wrap: anywhere;
    }

    .right-panel .section {
      padding: var(--space-2);
    }

    .right-panel .section h2 {
      margin-bottom: 12px;
      font-size: 14px;
    }

    .right-panel .control,
    .right-panel .select-row,
    .right-panel .number-row,
    .right-panel .check-row,
    .right-panel .color-row {
      display: grid;
      grid-template-columns: minmax(98px, .72fr) minmax(0, 1fr) 78px;
      gap: var(--space-1);
      align-items: center;
      margin: var(--space-1) 0;
    }

    .right-panel .control label,
    .right-panel .select-row label,
    .right-panel .number-row label,
    .right-panel .check-row label,
    .right-panel .color-row label {
      min-width: 0;
      color: var(--label);
      font-size: 12px;
      line-height: 1.2;
    }

    .right-panel .control input[type="range"] {
      grid-column: 2;
      min-width: 0;
    }

    .right-panel .control .value {
      grid-column: 3;
      grid-row: 1;
      width: 78px;
    }

    .right-panel .select-row select,
    .right-panel .number-row input,
    .right-panel .check-row input,
    .right-panel .color-row .color-inputs {
      grid-column: 2 / -1;
      min-width: 0;
    }

    .right-panel .color-inputs {
      grid-template-columns: minmax(0, 1fr) 48px;
    }

    .right-panel .color-swatch {
      width: 48px;
    }

    .right-panel .toggle-row input[type="checkbox"],
    .right-panel .check-row input[type="checkbox"] {
      position: relative;
      width: 34px;
      height: 20px;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--control-bg);
      transition: background .18s ease, border-color .18s ease;
    }

    .right-panel .toggle-row input[type="checkbox"]::after,
    .right-panel .check-row input[type="checkbox"]::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      transition: transform .18s ease;
    }

    .right-panel .toggle-row input[type="checkbox"]:checked,
    .right-panel .check-row input[type="checkbox"]:checked {
      border-color: var(--accent);
      background: var(--accent);
    }

    .right-panel .toggle-row input[type="checkbox"]:checked::after,
    .right-panel .check-row input[type="checkbox"]:checked::after {
      transform: translateX(14px);
      background: #ffffff;
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin: var(--space-1) 0;
    }

    .color-row label {
      font-size: 12px;
      color: var(--label);
    }

    .color-inputs {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-1);
      align-items: center;
    }

    .color-swatch {
      width: 64px;
      min-height: 30px;
      padding: 3px;
      border-radius: var(--radius);
      background: var(--control-bg);
    }

    .color-swatch span {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 22px;
      border: 1px solid rgba(0, 0, 0, .16);
      border-radius: var(--radius-sm);
    }

    input[type="checkbox"] {
      justify-self: start;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      color: var(--text);
      background: var(--button-bg);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }

    button:hover {
      border-color: color-mix(in srgb, var(--accent) 58%, var(--line));
      background: var(--control-bg-hover);
    }

    .picker-backdrop {
      position: fixed;
      left: 340px;
      bottom: 24px;
      z-index: 20;
      pointer-events: none;
      touch-action: none;
    }

    .picker-dialog {
      width: min(360px, calc(100vw - 28px));
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      pointer-events: auto;
    }

    .picker-title {
      margin: 0;
      padding: var(--space-1) var(--space-2);
      color: var(--text);
      background: var(--panel-bg);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.2;
      text-align: left;
      font-weight: 650;
      cursor: move;
      user-select: none;
    }

    .picker-body {
      display: grid;
      grid-template-columns: 1fr 26px;
      gap: var(--space-1);
      padding: var(--space-2);
    }

    .sv-plane {
      position: relative;
      height: 184px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: crosshair;
      overflow: hidden;
      background: #ff0000;
    }

    .sv-plane::before,
    .sv-plane::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sv-plane::before {
      background: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0));
    }

    .sv-plane::after {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0), #000000);
    }

    .picker-handle {
      position: absolute;
      z-index: 2;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .9);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hue-bar {
      position: relative;
      height: 184px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: ns-resize;
      background: linear-gradient(180deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
    }

    .hue-handle {
      position: absolute;
      left: -5px;
      right: -5px;
      height: 10px;
      border: 2px solid #ffffff;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .75);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .picker-preview {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-1);
      text-align: left;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .preview-box {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
    }

    .picker-fields {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: repeat(3, 1fr);
      align-content: start;
      gap: var(--space-1);
    }

    .picker-field {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 5px;
      align-items: center;
      color: var(--label);
      font-size: 11px;
      font-weight: 600;
    }

    .picker-field input {
      width: 100%;
      min-height: 26px;
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 3px 6px;
      font: inherit;
      font-size: 11px;
      text-transform: none;
    }

    .picker-field.hex {
      grid-column: 1 / -1;
      grid-template-columns: 18px 1fr;
      margin-top: 0;
    }

    .picker-actions {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .picker-actions button {
      min-height: 32px;
      color: var(--text);
      background: var(--button-bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .picker-actions button:hover {
      border-color: rgba(0, 122, 255, .55);
    }

    button.is-recording {
      color: #ffffff;
      border-color: rgba(255, 59, 48, .55);
      background: linear-gradient(180deg, #ff453a, #d70015);
      box-shadow: 0 0 0 3px rgba(255, 59, 48, .16);
      cursor: wait;
    }

    .is-hidden { display: none !important; }

    .drawer {
      position: fixed;
      top: 64px;
      right: 0;
      bottom: 0;
      z-index: 18;
      width: 320px;
      overflow-y: auto;
      padding: var(--space-2);
      background: var(--panel-bg);
      border-left: 1px solid var(--line);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(24px);
      transform: translateX(100%);
      transition: transform .22s ease;
    }

    .drawer.is-open {
      transform: translateX(0);
    }

    .drawer-head {
      display: flex;
      gap: var(--space-2);
      align-items: center;
      justify-content: space-between;
      margin: 0 0 var(--space-2);
    }

    .drawer-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .export-summary {
      display: grid;
      gap: 4px;
      margin: 0 0 var(--space-2);
      padding: 10px var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--section-bg) 68%, transparent);
    }

    .export-summary-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .export-summary-value {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .drawer-close {
      width: 30px;
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
    }

    .drawer .section {
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .drawer .section > h2 {
      display: none;
    }

    .export-group {
      margin: 0 0 var(--space-2);
      padding: var(--space-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--section-bg);
      box-shadow: var(--shadow-sm);
    }

    .export-group:last-child {
      margin-bottom: 0;
    }

    .export-group-title {
      margin: 0 0 var(--space-1);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .export-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-1);
    }

    .export-actions .ui-button {
      margin: 0;
      min-height: 38px;
      padding-inline: 10px;
      font-size: 12px;
    }

    .export-actions .ui-button:only-child {
      grid-column: 1 / -1;
    }

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);

      ctx.fillRect(0, 0, envCanvas.width, envCanvas.height);

      const strip = ctx.createLinearGradient(0, 0, envCanvas.width, 0);
      strip.addColorStop(0, 'rgba(255, 255, 255, 0.92)');
      strip.addColorStop(0.48, 'rgba(180, 196, 224, 0.42)');
      strip.addColorStop(1, 'rgba(255, 255, 255, 0.88)');

      ctx.fillRect(0, 186, envCanvas.width, 18);

      ctx.fillRect(48, 116, 184, 22);

      const texture = new THREE.CanvasTexture(envCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.mapping = THREE.EquirectangularReflectionMapping;
      return texture;
    }

    const studioEnvironment = createStudioEnvironment();
    const chromeEnvironment = createChromeEnvironment();
    const chromeReflectionTarget = new THREE.WebGLCubeRenderTarget(256, {

      generateMipmaps: true,

      chromeReflectColor: { value: new THREE.Color('#ffffff') }

    glassMaterial.onBeforeCompile = (shader) => {
      Object.assign(shader.uniforms, glassMaterial.userData.uniforms);
      shader.vertexShader = shader.vertexShader.replace(
        '#include <common>',
        `#include <common>
        varying vec3 vPanelLocal;`
      );
      shader.vertexShader = shader.vertexShader.replace(
        '#include <begin_vertex>',
        `#include <begin_vertex>
        vPanelLocal = position.xyz;`
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        '#include <common>',
        `#include <common>
        varying vec3 vPanelLocal;
        uniform vec3 panelBaseColor;
        uniform vec3 panelGradientColor;
        uniform float panelGradientAmount;
        uniform float panelGradientDirection;
        uniform float toneMapEnabled;
        uniform vec3 toneShadowColor;
        uniform vec3 toneMidColor;
        uniform vec3 toneHighlightColor;
        uniform float toneShadowLift;
        uniform float toneMapAmount;
        uniform float toneHighlightStrength;
        uniform float chromeMode;
        uniform vec3 chromeReflectColor;`
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        '#include <color_fragment>',
        `#include <color_fragment>
        float g = vPanelLocal.x;
        float directionMode = mod(panelGradientDirection, 3.0);
        if (directionMode > 0.5 && directionMode < 1.5) g = vPanelLocal.y;
        if (directionMode > 1.5) g = (vPanelLocal.x - vPanelLocal.y) * 0.7071;
        if (panelGradientDirection > 2.5) g *= -1.0;
        float gradientMix = smoothstep(-0.7, 0.7, g);
        diffuseColor.rgb = mix(panelBaseColor, panelGradientColor, gradientMix * panelGradientAmount);`
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        '#include <opaque_fragment>',
        `if (chromeMode > 0.5) {
          vec3 chromeOriginal = outgoingLight;
          vec3 viewDirChrome = normalize(vViewPosition);
          float chromeRim = pow(1.0 - abs(dot(normalize(normal), viewDirChrome)), 1.7);
          float sweepA = sin((vPanelLocal.x * 4.4 - vPanelLocal.y * 1.8) * 3.14159265);
          float sweepB = sin((vPanelLocal.x * -2.2 + vPanelLocal.y * 3.2) * 3.14159265 + 1.25);
          float wideReflection = smoothstep(0.36, 0.92, sweepA * 0.5 + 0.5);
          float narrowReflection = smoothstep(0.86, 0.99, sweepB * 0.5 + 0.5);
          vec3 chromeTint = mix(panelBaseColor, panelGradientColor, 0.42);
          vec3 softPanelReflection = mix(chromeTint, chromeReflectColor, 0.58);
          outgoingLight = mix(outgoingLight, chromeOriginal * 0.74 + chromeTint * 0.34, wideReflection * 0.34);

          vec3 specularLight = reflectedLight.directSpecular + reflectedLight.indirectSpecular;

          textureTone += toneHighlightColor * rim * toneHighlightStrength * 0.18;
          outgoingLight = mix(originalLight, textureTone, toneMapAmount);
        }
        #include <opaque_fragment>`
      );

    function optionLabel(option) {
      return optionLabels[option] || option;
    }

    function buildControl(control, box) {
      const registerControl = (element, sectionEntry = null) => {
        const entry = { control, element, sectionEntry };
        if (sectionEntry) sectionEntry.controls.push(entry);
        controlEntries.push(entry);
      };

      if (control.type === 'subhead') {
        const subhead = document.createElement('div');
        subhead.className = 'subhead';
        subhead.textContent = control.label;
        box.append(subhead);
        registerControl(subhead);
        return;
      }

      if (control.type === 'select') {
        const row = document.createElement('div');
        row.className = 'ui-row select-row';
        const label = document.createElement('label');
        label.textContent = control.label;
        const input = document.createElement('select');
        control.options.forEach((option) => {
          const item = document.createElement('option');
          item.value = option;
          item.textContent = optionLabel(option);
          input.append(item);
        });
        input.value = state[control.key];
        input.addEventListener('input', () => {
          state[control.key] = input.value;
          onChange(control);
        });
        row.append(label, input);
        box.append(row);
        inputs.set(control.key, { input, control });
        registerControl(row);
        return;
      }

      if (control.type === 'number') {
        const row = document.createElement('div');
        row.className = 'ui-row number-row';
        const label = document.createElement('label');
        label.textContent = control.label;
        const input = document.createElement('input');
        input.type = 'number';
        input.min = control.min;
        input.max = control.max;
        input.step = control.step;
        input.value = state[control.key];
        const setNumber = () => {
          const min = Number(control.min);
          const max = Number(control.max);
          const value = Number(input.value);
          if (!Number.isFinite(value)) return;
          const clamped = Math.min(max, Math.max(min, Math.round(value)));
          state[control.key] = clamped;
          input.value = clamped;
          onChange(control);
        };
        input.addEventListener('change', setNumber);
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') input.blur();
        });
        row.append(label, input);
        box.append(row);
        inputs.set(control.key, { input, control });
        registerControl(row);
        return;
      }

      if (control.type === 'checkbox') {
        const row = document.createElement('div');
        row.className = 'ui-row toggle-row check-row';
        const label = document.createElement('label');
        label.textContent = control.label;
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = state[control.key];
        input.addEventListener('input', () => {
          state[control.key] = input.checked;
          onChange(control);
        });
        row.append(label, input);
        box.append(row);
        inputs.set(control.key, { input, control });
        registerControl(row);
      }
    }

    function buildUI() {
      const canvasBox = document.createElement('section');
      canvasBox.className = 'section';
      const canvasTitle = document.createElement('h2');
      canvasTitle.textContent = 'Canvas';
      canvasBox.append(canvasTitle);

        tab.textContent = inspectorTabLabels[name] || name;
        tab.addEventListener('click', () => {
          inspectorTabs.querySelectorAll('.inspector-tab').forEach((item) => item.classList.toggle('is-active', item === tab));
          rightUi.querySelectorAll('.inspector-panel').forEach((panel) => panel.classList.toggle('is-active', panel.dataset.tab === name));
        });
        inspectorTabs.append(tab);

        const panel = document.createElement('div');
        panel.className = `inspector-panel${index === 0 ? ' is-active' : ''}`;
        panel.dataset.tab = name;
        rightUi.append(panel);
        inspectorPanels.set(name, panel);
      });

      specs.forEach((section) => {
        const isExport = section.title === 'Export';
        const targetUi = isExport ? exportUi : inspectorPanels.get(section.title) || rightUi;

        const sectionEntry = { section, box, controls: [] };
        const title = document.createElement('h2');
        title.textContent = inspectorTabLabels[section.title] || section.title;

        const basicGroup = document.createElement('div');

        const advancedTitle = document.createElement('div');

        advancedGroup.append(advancedTitle);
        if (!isExport) {
          box.append(basicGroup, advancedGroup);
        }

        section.controls.forEach((control) => {
          const registerControl = (element) => {
            const entry = { control, element, sectionEntry };
            sectionEntry.controls.push(entry);
            controlEntries.push(entry);
          };
          const controlParent = !isExport && advancedControls.has(control.key || control.label) ? advancedGroup : !isExport ? basicGroup : box;

          if (control.type === 'subhead') {
            const subhead = document.createElement('div');
            subhead.className = isExport ? 'export-group-title' : 'subhead section-header';
            subhead.textContent = control.label;
            if (isExport) {
              const group = document.createElement('div');
              group.className = 'export-group';
              group.dataset.exportGroup = control.exportGroup || control.label.toLowerCase();
              group.append(subhead);
              box.append(group);
              box.dataset.activeExportGroup = group.dataset.exportGroup;
            } else {
              controlParent.append(subhead);
            }
            registerControl(subhead);
            return;
          }

          const exportGroup = isExport ? box.querySelector(`[data-export-group="${box.dataset.activeExportGroup || ''}"]`) || box : null;
          const appendTarget = exportGroup || controlParent;
          const appendElement = (element) => {
            if (isExport && control.type === 'button') {
              let actions = appendTarget.querySelector(':scope > .export-actions');
              if (!actions) {
                actions = document.createElement('div');
                actions.className = 'export-actions';
                appendTarget.append(actions);
              }
              actions.append(element);
              return;
            }
            appendTarget.append(element);
          };

          if (control.type === 'button') {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'ui-button';
            button.textContent = control.label;
            button.addEventListener('click', control.action);
            if (control.recordButton) button.classList.add('primary-action');
            appendElement(button);
            if (control.recordButton) recordButton = button;
            registerControl(button);
            return;
          }

          if (control.type === 'select') {
            const row = document.createElement('div');
            row.className = 'ui-row select-row';
            const label = document.createElement('label');
            label.textContent = control.label;
            const input = document.createElement('select');
            control.options.forEach((option) => {
              const item = document.createElement('option');
              item.value = option;
              item.textContent = optionLabel(option);
              input.append(item);
            });
            input.value = state[control.key];
            input.addEventListener('input', () => {
              state[control.key] = input.value;
              onChange(control);
            });
            row.append(label, input);
            appendElement(row);
            inputs.set(control.key, { input, control });
            registerControl(row);
            return;
          }

          if (control.type === 'color') {
            const row = document.createElement('div');
            row.className = 'ui-row color-row';
            const label = document.createElement('label');
            label.textContent = control.label;
            const inputsWrap = document.createElement('div');
            inputsWrap.className = 'color-inputs';
            const hexInput = document.createElement('input');
            hexInput.type = 'text';
            hexInput.value = state[control.key].toUpperCase();
            hexInput.placeholder = '#RRGGBB';
            const picker = document.createElement('button');
            picker.type = 'button';
            picker.className = 'color-swatch';
            picker.setAttribute('aria-label', `Open ${control.label} picker`);
            const swatch = document.createElement('span');
            swatch.style.background = state[control.key];
            picker.append(swatch);

            const setColor = (value) => {
              const normalized = normalizeHex(value);
              if (!normalized) return;
              state[control.key] = normalized;
              hexInput.value = normalized.toUpperCase();
              swatch.style.background = normalized;
              onChange(control);
            };

            hexInput.addEventListener('change', () => setColor(hexInput.value));
            hexInput.addEventListener('keydown', (event) => {
              if (event.key === 'Enter') hexInput.blur();
            });
            picker.addEventListener('click', () => openColorPicker(control.key, control));
            inputsWrap.append(hexInput, picker);
            row.append(label, inputsWrap);
            appendElement(row);
            inputs.set(control.key, { input: hexInput, picker, swatch, control });
            registerControl(row);
            return;
          }

          if (control.type === 'checkbox') {
            const row = document.createElement('div');
            row.className = 'ui-row toggle-row check-row';
            const label = document.createElement('label');
            label.textContent = control.label;
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.checked = state[control.key];
            input.addEventListener('input', () => {
              state[control.key] = input.checked;
              onChange(control);
            });
            row.append(label, input);
            appendElement(row);
            inputs.set(control.key, { input, control });
            registerControl(row);
            return;
          }

          const row = document.createElement('div');
          row.className = 'ui-row slider-row control';
          const label = document.createElement('label');
          label.textContent = control.label;
          const value = document.createElement('input');
          value.type = 'number';
          value.className = 'value';
          value.min = control.min;
          value.max = control.max;
          value.step = control.step;
          value.value = formatValue(state[control.key], control.step);
          const input = document.createElement('input');
          input.type = 'range';
          input.min = control.min;
          input.max = control.max;
          input.step = control.step;
          input.value = state[control.key];
          const setNumericValue = (nextValue) => {
            const min = Number(control.min);
            const max = Number(control.max);
            const valueNumber = Number(nextValue);
            if (!Number.isFinite(valueNumber)) return;
            const clamped = Math.min(max, Math.max(min, valueNumber));
            state[control.key] = clamped;
            input.value = clamped;
            value.value = formatValue(clamped, control.step);
            onChange(control);
          };
          input.addEventListener('input', () => {
            setNumericValue(input.value);
          });
          value.addEventListener('change', () => setNumericValue(value.value));
          value.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') value.blur();
          });
          row.append(label, value, input);
          appendElement(row);
          inputs.set(control.key, { input, value, control });
          registerControl(row);
        });

        if (!isExport) {
          const advancedHasContent = advancedGroup.children.length > 1;
          advancedGroup.classList.toggle('is-hidden', !advancedHasContent);
        }

        targetUi.append(box);
        controlEntries.push(sectionEntry);
      });
