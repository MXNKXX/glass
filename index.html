<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glass Plate Array</title>
  <style>
    :root {
      color-scheme: light;
      --panel: #ffffff;
      --panel-soft: #f5f5f7;
      --body-bg: #ffffff;
      --view-bg: #ffffff;
      --panel-bg: linear-gradient(180deg, #fbfbfd, #f5f5f7);
      --section-bg: rgba(255, 255, 255, .82);
      --button-bg: linear-gradient(180deg, #ffffff, #f2f2f5);
      --canvas-shadow: 0 18px 50px rgba(20, 33, 45, .12);
      --line: rgba(0, 0, 0, .1);
      --text: #1d1d1f;
      --label: #2b2b2f;
      --muted: #6e6e73;
      --accent: #007aff;
    }

    body.dark {
      color-scheme: dark;
      --panel: #12151b;
      --panel-soft: #1b2029;
      --body-bg: #0e1116;
      --view-bg: #0d1117;
      --panel-bg: linear-gradient(180deg, #101319, #151922);
      --section-bg: rgba(255, 255, 255, .035);
      --button-bg: linear-gradient(180deg, #29303b, #202630);
      --canvas-shadow: 0 18px 50px rgba(0, 0, 0, .28);
      --line: rgba(255, 255, 255, .12);
      --text: #eef3f7;
      --label: #dbe4ec;
      --muted: #99a4af;
      --accent: #82ddff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--body-bg);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      width: 100%;
      height: 100%;
    }

    .panel {
      overflow-y: auto;
      padding: 20px 16px 24px;
      background: var(--panel-bg);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(24px);
    }

    .panel-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      margin: 0 0 16px;
    }

    .panel-copy {
      min-width: 0;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 650;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .theme-toggle {
      width: auto;
      min-width: 76px;
      min-height: 30px;
      padding: 5px 10px;
      white-space: nowrap;
    }

    .section {
      margin: 0 0 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--section-bg);
      box-shadow: 0 1px 2px rgba(0, 0, 0, .04);
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 0;
      font-weight: 650;
    }

    .control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 7px 10px;
      align-items: center;
      margin: 10px 0;
    }

    .control label {
      font-size: 12px;
      color: var(--label);
    }

    .value {
      min-width: 42px;
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="color"] {
      width: 42px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: transparent;
    }

    input[type="text"] {
      min-height: 30px;
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 8px;
      font: inherit;
      font-size: 12px;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-height: 30px;
      color: var(--text);
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 8px;
      font: inherit;
      font-size: 12px;
    }

    .select-row,
    .check-row {
      display: grid;
      grid-template-columns: 1fr 1.08fr;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .select-row label,
    .check-row label {
      font-size: 12px;
      color: var(--label);
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin: 10px 0;
    }

    .color-row label {
      font-size: 12px;
      color: var(--label);
    }

    .color-inputs {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    input[type="checkbox"] {
      justify-self: start;
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    button {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--button-bg);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover { border-color: rgba(130, 221, 255, .65); }

    .is-hidden { display: none !important; }

    .view {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      height: 100vh;
      overflow: hidden;
      padding: 22px;
      background: var(--view-bg);
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      box-shadow: var(--canvas-shadow);
    }

    @media (max-width: 760px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 48vh auto;
        height: auto;
        min-height: 100vh;
      }
      .view {
        grid-row: 1;
        height: 48vh;
        min-height: 380px;
        padding: 12px;
      }
      .panel {
        grid-row: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel">
      <div class="panel-head">
        <div class="panel-copy">
          <h1>Glass Plate Array</h1>
          <p class="intro">Thin solid discs and rounded plates arranged in 3D space.</p>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button">Light UI</button>
      </div>
      <div id="ui"></div>
    </aside>

    <section class="view" id="view">
      <canvas id="canvas"></canvas>
    </section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const view = document.querySelector('#view');
    const canvas = document.querySelector('#canvas');
    const ui = document.querySelector('#ui');
    const themeToggle = document.querySelector('#themeToggle');

    const state = {
      lightUI: true,
      canvasSize: '16:9 Widescreen',
      shape: 'roundedRect',
      count: 14,
      panelSize: 1.12,
      panelAspect: 0.65,
      cornerRadius: 0.18,
      discInflate: 0.55,
      rotationPreset: 'front 0deg',
      shapeRotX: 0,
      shapeRotY: 0,
      shapeRotZ: 0,
      layout: 'ring',
      spacing: 1,
      lineSpacingX: 0.62,
      lineSpacingZ: 0.08,
      lineWaveAmount: 0,
      lineWaveFrequency: 1.5,
      layoutFacing: 'tangent',
      layoutStartAngle: -90,
      axisRotX: 0,
      axisRotY: 0,
      axisRotZ: 0,
      selectedItem: 0,
      customX: 0,
      customY: 0,
      customZ: 0,
      customRotX: 0,
      customRotY: 0,
      customRotZ: 0,
      customScale: 1,
      motion: true,
      groupRotate: true,
      groupSpeed: 0.18,
      selfSpin: true,
      selfSpeed: 0.55,
      selfSpinOffset: 0,
      cameraPreset: 'perspective',
      cameraYaw: 37,
      cameraPitch: 22,
      cameraRoll: 0,
      zoom: 1,
      perspectiveStrength: 0.25,
      backgroundColor: '#eaf2f4',
      objectColor: '#c9fbff',
      panelGradientColor: '#7b4dff',
      panelGradientAmount: 0.35,
      panelGradientDirection: 'diagonal',
      backLayer: false,
      backLayerOpacity: 0,
      backLayerBlur: 0.2,
      opacity: 0.54,
      gloss: 0.72,
      thickness: 0.08
    };

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true,
      preserveDrawingBuffer: true
    });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(state.backgroundColor);

    const camera = new THREE.PerspectiveCamera(42, 1, 0.05, 80);
    const target = new THREE.Vector3(0, 0, 0);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.target.copy(target);

    const masterGroup = new THREE.Group();
    masterGroup.name = 'masterGroup';
    scene.add(masterGroup);
    const layoutGroup = new THREE.Group();
    layoutGroup.name = 'layoutAxisGroup';
    masterGroup.add(layoutGroup);

    const ambient = new THREE.HemisphereLight(0xffffff, 0x9db2c0, 1.45);
    const key = new THREE.DirectionalLight(0xffffff, 2.4);
    key.position.set(4, 6, 5);
    const rimLight = new THREE.DirectionalLight(0x95eaff, 2.1);
    rimLight.position.set(-4, 2.5, -4);
    scene.add(ambient, key, rimLight);

    const backdropMaterial = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      depthWrite: false,
      uniforms: {
        base: { value: new THREE.Color(state.backgroundColor) },
        top: { value: new THREE.Color(state.backgroundColor).lerp(new THREE.Color('#ffffff'), 0.28) }
      },
      vertexShader: `
        varying vec3 vWorld;
        void main() {
          vec4 world = modelMatrix * vec4(position, 1.0);
          vWorld = world.xyz;
          gl_Position = projectionMatrix * viewMatrix * world;
        }
      `,
      fragmentShader: `
        varying vec3 vWorld;
        uniform vec3 base;
        uniform vec3 top;
        void main() {
          vec3 dir = normalize(vWorld);
          float y = dir.y * 0.5 + 0.5;
          vec3 color = mix(base, top, smoothstep(0.1, 1.0, y));
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });
    const backdropMesh = new THREE.Mesh(new THREE.SphereGeometry(36, 48, 24), backdropMaterial);
    scene.add(backdropMesh);

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: state.objectColor,
      transparent: true,
      opacity: state.opacity,
      transmission: 0.65,
      roughness: 0.18,
      metalness: 0,
      thickness: 0.6,
      ior: 1.46,
      reflectivity: 0.65,
      clearcoat: 0.8,
      clearcoatRoughness: 0.08,
      side: THREE.DoubleSide,
      depthWrite: false
    });

    glassMaterial.userData.uniforms = {
      panelBaseColor: { value: new THREE.Color(state.objectColor) },
      panelGradientColor: { value: new THREE.Color(state.panelGradientColor) },
      panelGradientAmount: { value: state.panelGradientAmount },
      panelGradientDirection: { value: 2 }
    };

    glassMaterial.onBeforeCompile = (shader) => {
      Object.assign(shader.uniforms, glassMaterial.userData.uniforms);
      shader.vertexShader = shader.vertexShader.replace(
        '#include <common>',
        `#include <common>
        varying vec3 vPanelLocal;`
      );
      shader.vertexShader = shader.vertexShader.replace(
        '#include <begin_vertex>',
        `#include <begin_vertex>
        vPanelLocal = position.xyz;`
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        '#include <common>',
        `#include <common>
        varying vec3 vPanelLocal;
        uniform vec3 panelBaseColor;
        uniform vec3 panelGradientColor;
        uniform float panelGradientAmount;
        uniform float panelGradientDirection;`
      );
      shader.fragmentShader = shader.fragmentShader.replace(
        '#include <color_fragment>',
        `#include <color_fragment>
        float g = vPanelLocal.x;
        if (panelGradientDirection > 0.5 && panelGradientDirection < 1.5) g = vPanelLocal.y;
        if (panelGradientDirection > 1.5) g = (vPanelLocal.x - vPanelLocal.y) * 0.7071;
        float gradientMix = smoothstep(-0.7, 0.7, g);
        diffuseColor.rgb = mix(panelBaseColor, panelGradientColor, gradientMix * panelGradientAmount);`
      );
    };

    const fillMaterial = new THREE.MeshBasicMaterial({
      color: state.objectColor,
      transparent: true,
      opacity: 0.12,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    const backLayerMaterial = new THREE.MeshBasicMaterial({
      color: state.objectColor,
      transparent: true,
      opacity: state.backLayerOpacity,
      depthWrite: false,
      side: THREE.DoubleSide
    });

    let items = [];
    let sharedGeometry = null;
    let cameraTween = null;
    const clock = new THREE.Clock();

    const specs = [
      { title: 'Canvas', controls: [
        { key: 'canvasSize', label: 'Canvas size', type: 'select', options: ['1:1 Square', '16:9 Widescreen', '9:16 Social story', '4:3 Classic', '3:4 Traditional', '3:2 Standard', '2:3 Portrait', '1:2 Vertical', '2:1 Horizontal', '4:5 Social post'], canvas: true }
      ]},
      { title: 'Layout', controls: [
        { key: 'layout', label: 'Layout', type: 'select', options: ['line', 'arc', 'ring', 'custom'] },
        { key: 'spacing', label: 'Spacing', type: 'range', min: 0.12, max: 1.8, step: 0.005, showWhen: () => state.layout !== 'custom' },
        { key: 'layoutFacing', label: 'Panel direction', type: 'select', options: ['tangent', 'same direction', 'inward', 'outward'], showWhen: () => state.layout !== 'custom' },
        { key: 'layoutStartAngle', label: 'Start angle', type: 'range', min: -180, max: 180, step: 1, showWhen: () => state.layout === 'arc' || state.layout === 'ring' },
        { key: 'lineSpacingX', label: 'Line spacing X', type: 'range', min: 0, max: 2.5, step: 0.01, showWhen: () => state.layout === 'line' },
        { key: 'lineSpacingZ', label: 'Line spacing Z', type: 'range', min: -2.5, max: 2.5, step: 0.01, showWhen: () => state.layout === 'line' },
        { key: 'lineWaveAmount', label: 'Line wave amount', type: 'range', min: 0, max: 2.5, step: 0.01, showWhen: () => state.layout === 'line' },
        { key: 'lineWaveFrequency', label: 'Line wave frequency', type: 'range', min: 0.25, max: 4, step: 0.01, showWhen: () => state.layout === 'line' },
        { key: 'axisRotX', label: 'Layout axis tilt X', type: 'range', min: -90, max: 90, step: 1, showWhen: () => state.layout !== 'custom' },
        { key: 'axisRotY', label: 'Layout axis turn Y', type: 'range', min: -180, max: 180, step: 1, showWhen: () => state.layout !== 'custom' },
        { key: 'axisRotZ', label: 'Layout axis roll Z', type: 'range', min: -180, max: 180, step: 1, showWhen: () => state.layout !== 'custom' }
      ]},
      { title: 'Custom Edit', showWhen: () => state.layout === 'custom', controls: [
        { key: 'selectedItem', label: 'Selected item', type: 'range', min: 0, max: 23, step: 1, customSelect: true },
        { key: 'customX', label: 'Position X', type: 'range', min: -6, max: 6, step: 0.01, customTransform: true },
        { key: 'customY', label: 'Position Y', type: 'range', min: -4, max: 4, step: 0.01, customTransform: true },
        { key: 'customZ', label: 'Position Z', type: 'range', min: -6, max: 6, step: 0.01, customTransform: true },
        { key: 'customRotX', label: 'Rotation X', type: 'range', min: -180, max: 180, step: 1, customTransform: true },
        { key: 'customRotY', label: 'Rotation Y', type: 'range', min: -180, max: 180, step: 1, customTransform: true },
        { key: 'customRotZ', label: 'Rotation Z', type: 'range', min: -180, max: 180, step: 1, customTransform: true },
        { key: 'customScale', label: 'Scale', type: 'range', min: 0.2, max: 2.2, step: 0.01, customTransform: true },
        { label: 'Reset Selected', type: 'button', action: resetSelectedCustom },
        { label: 'Reset All Custom', type: 'button', action: resetAllCustom }
      ]},
      { title: 'Shape', controls: [
        { key: 'shape', label: 'Shape type', type: 'select', options: ['disc', 'roundedRect'], rebuild: true },
        { key: 'count', label: 'Count', type: 'range', min: 1, max: 24, step: 1, rebuild: true },
        { key: 'panelSize', label: 'Panel size', type: 'range', min: 0.45, max: 2.1, step: 0.01, rebuild: true },
        { key: 'panelAspect', label: 'Aspect W/H', type: 'range', min: 0.35, max: 2.4, step: 0.01, rebuild: true },
        { key: 'cornerRadius', label: 'Corner radius', type: 'range', min: 0.02, max: 0.5, step: 0.01, rebuild: true, showWhen: () => state.shape === 'roundedRect' },
        { key: 'discInflate', label: 'Disc inflate', type: 'range', min: 0, max: 1.2, step: 0.01, rebuild: true, showWhen: () => state.shape === 'disc' },
        { key: 'thickness', label: 'Thickness', type: 'range', min: 0.02, max: 0.28, step: 0.005, rebuild: true },
        { key: 'rotationPreset', label: 'Rotation preset', type: 'select', options: ['custom', 'front 0deg', 'side 90deg', 'back 180deg', 'flat top 90deg', 'roll 90deg'], rotationPreset: true },
        { key: 'shapeRotX', label: 'Shape rotation X', type: 'range', min: -90, max: 90, step: 1 },
        { key: 'shapeRotY', label: 'Shape rotation Y', type: 'range', min: -180, max: 180, step: 1 },
        { key: 'shapeRotZ', label: 'Shape rotation Z', type: 'range', min: -180, max: 180, step: 1 }
      ]},
      { title: 'Motion', controls: [
        { key: 'motion', label: 'Motion on/off', type: 'checkbox' },
        { key: 'groupRotate', label: 'Group rotate on/off', type: 'checkbox' },
        { key: 'groupSpeed', label: 'Group rotate speed', type: 'range', min: -1.2, max: 1.2, step: 0.01 },
        { key: 'selfSpin', label: 'Self spin on/off', type: 'checkbox' },
        { key: 'selfSpeed', label: 'Self spin speed', type: 'range', min: -2.5, max: 2.5, step: 0.01 },
        { key: 'selfSpinOffset', label: 'Self spin offset', type: 'range', min: 0, max: 0.6, step: 0.01, showWhen: () => state.selfSpin }
      ]},
      { title: 'Camera', controls: [
        { key: 'cameraPreset', label: 'Camera angle', type: 'select', options: ['front', 'top', 'side', 'isometric', 'perspective', 'custom'], camera: true },
        { key: 'cameraYaw', label: 'Camera yaw L/R', type: 'range', min: -180, max: 180, step: 1, camera: true, cameraManual: true },
        { key: 'cameraPitch', label: 'Camera pitch U/D', type: 'range', min: -85, max: 85, step: 1, camera: true, cameraManual: true },
        { key: 'cameraRoll', label: 'Horizon tilt / roll', type: 'range', min: -180, max: 180, step: 1, camera: true, cameraManual: true },
        { key: 'zoom', label: 'Zoom', type: 'range', min: 0.45, max: 2.2, step: 0.01, camera: true },
        { key: 'perspectiveStrength', label: 'Perspective strength', type: 'range', min: 0, max: 1, step: 0.01, camera: true }
      ]},
      { title: 'Look', controls: [
        { key: 'backgroundColor', label: 'Background color', type: 'color' },
        { key: 'objectColor', label: 'Object color', type: 'color' },
        { key: 'panelGradientColor', label: 'Panel gradient color', type: 'color' },
        { key: 'panelGradientAmount', label: 'Panel gradient amount', type: 'range', min: 0, max: 1, step: 0.01 },
        { key: 'panelGradientDirection', label: 'Panel gradient direction', type: 'select', options: ['horizontal', 'vertical', 'diagonal'] },
        { key: 'opacity', label: 'Opacity', type: 'range', min: 0.08, max: 1, step: 0.01 },
        { key: 'gloss', label: 'Gloss', type: 'range', min: 0, max: 1, step: 0.01 },
        { key: 'backLayer', label: 'Background blur on/off', type: 'checkbox' },
        { key: 'backLayerOpacity', label: 'Blur layer opacity', type: 'range', min: 0, max: 0.6, step: 0.01, showWhen: () => state.backLayer },
        { key: 'backLayerBlur', label: 'Blur layer amount', type: 'range', min: 0, max: 1, step: 0.01, showWhen: () => state.backLayer }
      ]},
      { title: 'Export', controls: [
        { label: 'Export JPG', type: 'button', action: exportJPG },
        { label: 'PNG object only', type: 'button', action: exportPNGObject },
        { label: 'Record MP4 5s', type: 'button', action: recordVideo }
      ]}
    ];

    const inputs = new Map();
    const controlEntries = [];
    let customTransforms = [];
    const canvasPresets = {
      '1:1 Square': [1, 1, 1080, 1080],
      '16:9 Widescreen': [16, 9, 1280, 720],
      '9:16 Social story': [9, 16, 1080, 1920],
      '4:3 Classic': [4, 3, 1200, 900],
      '3:4 Traditional': [3, 4, 900, 1200],
      '3:2 Standard': [3, 2, 1200, 800],
      '2:3 Portrait': [2, 3, 900, 1350],
      '1:2 Vertical': [1, 2, 720, 1440],
      '2:1 Horizontal': [2, 1, 1440, 720],
      '4:5 Social post': [4, 5, 1080, 1350]
    };
    const rotationPresets = {
      'front 0deg': [0, 0, 0],
      'side 90deg': [0, 90, 0],
      'back 180deg': [0, 180, 0],
      'flat top 90deg': [90, 0, 0],
      'roll 90deg': [0, 0, 90]
    };
    const cameraAngles = {
      front: [0, 0, 0],
      top: [0, 85, 0],
      side: [90, 0, 0],
      isometric: [45, 35, 0],
      perspective: [37, 22, 0]
    };

    function buildUI() {
      specs.forEach((section) => {
        const box = document.createElement('section');
        box.className = 'section';
        const sectionEntry = { section, box, controls: [] };
        const title = document.createElement('h2');
        title.textContent = section.title;
        box.append(title);

        section.controls.forEach((control) => {
          const registerControl = (element) => {
            const entry = { control, element, sectionEntry };
            sectionEntry.controls.push(entry);
            controlEntries.push(entry);
          };

          if (control.type === 'button') {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = control.label;
            button.addEventListener('click', control.action);
            box.append(button);
            registerControl(button);
            return;
          }

          if (control.type === 'select') {
            const row = document.createElement('div');
            row.className = 'select-row';
            const label = document.createElement('label');
            label.textContent = control.label;
            const input = document.createElement('select');
            control.options.forEach((option) => {
              const item = document.createElement('option');
              item.value = option;
              item.textContent = option;
              input.append(item);
            });
            input.value = state[control.key];
            input.addEventListener('input', () => {
              state[control.key] = input.value;
              onChange(control);
            });
            row.append(label, input);
            box.append(row);
            inputs.set(control.key, { input, control });
            registerControl(row);
            return;
          }

          if (control.type === 'color') {
            const row = document.createElement('div');
            row.className = 'color-row';
            const label = document.createElement('label');
            label.textContent = control.label;
            const inputsWrap = document.createElement('div');
            inputsWrap.className = 'color-inputs';
            const hexInput = document.createElement('input');
            hexInput.type = 'text';
            hexInput.value = state[control.key].toUpperCase();
            hexInput.placeholder = '#RRGGBB';
            const picker = document.createElement('input');
            picker.type = 'color';
            picker.value = state[control.key];

            const setColor = (value) => {
              const normalized = normalizeHex(value);
              if (!normalized) return;
              state[control.key] = normalized;
              hexInput.value = normalized.toUpperCase();
              picker.value = normalized;
              onChange(control);
            };

            hexInput.addEventListener('change', () => setColor(hexInput.value));
            hexInput.addEventListener('keydown', (event) => {
              if (event.key === 'Enter') hexInput.blur();
            });
            picker.addEventListener('input', () => setColor(picker.value));
            inputsWrap.append(hexInput, picker);
            row.append(label, inputsWrap);
            box.append(row);
            inputs.set(control.key, { input: hexInput, picker, control });
            registerControl(row);
            return;
          }

          if (control.type === 'checkbox') {
            const row = document.createElement('div');
            row.className = 'check-row';
            const label = document.createElement('label');
            label.textContent = control.label;
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.checked = state[control.key];
            input.addEventListener('input', () => {
              state[control.key] = input.checked;
              onChange(control);
            });
            row.append(label, input);
            box.append(row);
            inputs.set(control.key, { input, control });
            registerControl(row);
            return;
          }

          const row = document.createElement('div');
          row.className = 'control';
          const label = document.createElement('label');
          label.textContent = control.label;
          const value = document.createElement('span');
          value.className = 'value';
          value.textContent = formatValue(state[control.key]);
          const input = document.createElement('input');
          input.type = 'range';
          input.min = control.min;
          input.max = control.max;
          input.step = control.step;
          input.value = state[control.key];
          input.addEventListener('input', () => {
            state[control.key] = Number(input.value);
            value.textContent = formatValue(state[control.key]);
            onChange(control);
          });
          row.append(label, value, input);
          box.append(row);
          inputs.set(control.key, { input, value, control });
          registerControl(row);
        });

        ui.append(box);
        controlEntries.push(sectionEntry);
      });
    }

    function applyTheme() {
      document.body.classList.toggle('dark', !state.lightUI);
      themeToggle.textContent = state.lightUI ? 'Dark UI' : 'Light UI';
      themeToggle.setAttribute('aria-pressed', String(state.lightUI));
    }

    function refreshConditionalUI() {
      controlEntries.forEach((entry) => {
        if (entry.section && entry.box) {
          const sectionVisible = entry.section.showWhen ? entry.section.showWhen() : true;
          const hasVisibleControl = entry.controls.some((controlEntry) => !controlEntry.element.classList.contains('is-hidden'));
          entry.box.classList.toggle('is-hidden', !sectionVisible || !hasVisibleControl);
          return;
        }
        const visible = entry.control.showWhen ? entry.control.showWhen() : true;
        entry.element.classList.toggle('is-hidden', !visible);
      });
    }

    function formatValue(value) {
      return Number.isInteger(value) ? String(value) : Number(value).toFixed(2);
    }

    function normalizeHex(value) {
      const raw = String(value).trim();
      const withHash = raw.startsWith('#') ? raw : `#${raw}`;
      if (/^#[0-9a-fA-F]{6}$/.test(withHash)) return withHash.toLowerCase();
      if (/^#[0-9a-fA-F]{3}$/.test(withHash)) {
        return `#${withHash[1]}${withHash[1]}${withHash[2]}${withHash[2]}${withHash[3]}${withHash[3]}`.toLowerCase();
      }
      return null;
    }

    function syncUI() {
      const selectedEntry = inputs.get('selectedItem');
      if (selectedEntry) selectedEntry.input.max = Math.max(0, state.count - 1);
      inputs.forEach((entry, key) => {
        const value = state[key];
        if (entry.input.type === 'checkbox') {
          entry.input.checked = Boolean(value);
        } else if (entry.picker) {
          entry.input.value = String(value).toUpperCase();
          entry.picker.value = value;
        } else {
          entry.input.value = value;
        }
        if (entry.value) entry.value.textContent = formatValue(value);
      });
    }

    function defaultCustomTransform(index) {
      const half = (Math.max(1, state.count) - 1) / 2;
      return {
        x: (index - half) * 0.72,
        y: 0,
        z: 0,
        rx: 0,
        ry: 0,
        rz: 0,
        scale: 1
      };
    }

    function ensureCustomTransforms() {
      for (let i = customTransforms.length; i < state.count; i++) {
        customTransforms[i] = defaultCustomTransform(i);
      }
      customTransforms.length = state.count;
      state.selectedItem = Math.min(Math.max(0, Math.round(state.selectedItem)), Math.max(0, state.count - 1));
    }

    function loadSelectedCustomTransform() {
      ensureCustomTransforms();
      const data = customTransforms[state.selectedItem] || defaultCustomTransform(state.selectedItem);
      state.customX = data.x;
      state.customY = data.y;
      state.customZ = data.z;
      state.customRotX = data.rx;
      state.customRotY = data.ry;
      state.customRotZ = data.rz;
      state.customScale = data.scale;
    }

    function saveSelectedCustomTransform() {
      ensureCustomTransforms();
      customTransforms[state.selectedItem] = {
        x: state.customX,
        y: state.customY,
        z: state.customZ,
        rx: state.customRotX,
        ry: state.customRotY,
        rz: state.customRotZ,
        scale: state.customScale
      };
    }

    function resetSelectedCustom() {
      ensureCustomTransforms();
      customTransforms[state.selectedItem] = defaultCustomTransform(state.selectedItem);
      loadSelectedCustomTransform();
      syncUI();
      updateLayout();
    }

    function resetAllCustom() {
      customTransforms = [];
      ensureCustomTransforms();
      loadSelectedCustomTransform();
      syncUI();
      updateLayout();
    }

    function onChange(control) {
      if (control.customSelect) {
        state.selectedItem = Math.round(state.selectedItem);
        loadSelectedCustomTransform();
        syncUI();
      }
      if (control.customTransform) {
        saveSelectedCustomTransform();
      }
      if (control.key === 'layout' && state.layout === 'custom') {
        ensureCustomTransforms();
        loadSelectedCustomTransform();
        syncUI();
      }
      if (control.rotationPreset && state.rotationPreset !== 'custom') {
        const values = rotationPresets[state.rotationPreset];
        if (values) {
          [state.shapeRotX, state.shapeRotY, state.shapeRotZ] = values;
          syncUI();
        }
      }
      if (['shapeRotX', 'shapeRotY', 'shapeRotZ'].includes(control.key)) {
        state.rotationPreset = 'custom';
        syncUI();
      }
      if (control.key === 'cameraPreset' && state.cameraPreset !== 'custom') {
        const values = cameraAngles[state.cameraPreset];
        if (values) {
          [state.cameraYaw, state.cameraPitch, state.cameraRoll] = values;
          syncUI();
        }
      }
      if (control.cameraManual) {
        state.cameraPreset = 'custom';
        syncUI();
      }
      if (control.rebuild) rebuildItems();
      if (control.camera) moveCamera(state.cameraPreset, true);
      if (control.canvas) resize();
      applyLook();
      applyLayoutAxis();
      updateLayout();
      refreshConditionalUI();
    }

    function applyLayoutAxis() {
      layoutGroup.rotation.order = 'YXZ';
      if (state.layout === 'custom') {
        layoutGroup.rotation.set(0, 0, 0);
        return;
      }
      layoutGroup.rotation.set(
        THREE.MathUtils.degToRad(state.axisRotX),
        THREE.MathUtils.degToRad(state.axisRotY),
        THREE.MathUtils.degToRad(state.axisRotZ)
      );
    }

    function roundedRectShape(width, height, radius) {
      const x = -width / 2;
      const y = -height / 2;
      const r = Math.min(radius, width * .45, height * .45);
      const shape = new THREE.Shape();
      shape.moveTo(x + r, y);
      shape.lineTo(x + width - r, y);
      shape.quadraticCurveTo(x + width, y, x + width, y + r);
      shape.lineTo(x + width, y + height - r);
      shape.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      shape.lineTo(x + r, y + height);
      shape.quadraticCurveTo(x, y + height, x, y + height - r);
      shape.lineTo(x, y + r);
      shape.quadraticCurveTo(x, y, x + r, y);
      return shape;
    }

    function getPanelDimensions() {
      const aspect = Math.max(0.05, state.panelAspect);
      const width = state.panelSize * Math.sqrt(aspect);
      const height = state.panelSize / Math.sqrt(aspect);
      return { width, height };
    }

    function createDiscGeometry(width, height) {
      if (state.discInflate <= 0.001) {
        const flat = new THREE.CylinderGeometry(0.5, 0.5, state.thickness, 128, 1, false);
        flat.rotateX(Math.PI / 2);
        flat.scale(width, height, 1);
        flat.computeVertexNormals();
        return flat;
      }

      const minDimension = Math.min(width, height);
      const halfDepth = state.thickness * 0.5 + minDimension * 0.16 * state.discInflate;
      const profile = [];
      const profileSteps = 34;
      for (let i = 0; i <= profileSteps; i++) {
        const angle = (i / profileSteps) * Math.PI;
        const radius = Math.sin(angle) * 0.5;
        const depth = Math.cos(angle) * halfDepth;
        profile.push(new THREE.Vector2(radius, depth));
      }

      const geometry = new THREE.LatheGeometry(profile, 128);
      geometry.rotateX(Math.PI / 2);
      geometry.scale(width, height, 1);
      geometry.computeVertexNormals();
      return geometry;
    }

    function createMainGeometry() {
      const { width, height } = getPanelDimensions();
      if (state.shape === 'disc') {
        return createDiscGeometry(width, height);
      }

      const cornerRadius = Math.min(width, height) * state.cornerRadius;
      const geometry = new THREE.ExtrudeGeometry(roundedRectShape(width, height, cornerRadius), {
        depth: state.thickness,
        bevelEnabled: true,
        bevelSize: Math.min(0.035, state.thickness * 0.42),
        bevelThickness: Math.min(0.035, state.thickness * 0.42),
        bevelSegments: 5,
        curveSegments: 16,
        steps: 1
      });
      geometry.center();
      geometry.computeVertexNormals();
      return geometry;
    }

    function rebuildItems() {
      items.forEach((item) => layoutGroup.remove(item.group));
      items = [];
      if (sharedGeometry) sharedGeometry.dispose();
      sharedGeometry = createMainGeometry();
      ensureCustomTransforms();
      loadSelectedCustomTransform();
      syncUI();

      for (let i = 0; i < state.count; i++) {
        const group = new THREE.Group();
        group.name = `itemGroup_${i}`;
        const pivot = new THREE.Group();
        pivot.name = `shapePivot_${i}`;

        const fill = new THREE.Mesh(sharedGeometry, fillMaterial);
        fill.name = `fill_${i}`;
        fill.scale.setScalar(0.985);
        fill.renderOrder = i * 3;

        const backLayer = new THREE.Mesh(sharedGeometry, backLayerMaterial);
        backLayer.name = `backLayer_${i}`;
        backLayer.visible = state.backLayer && state.backLayerOpacity > 0;
        backLayer.position.z = -state.thickness * (0.18 + state.backLayerBlur * 0.25);
        backLayer.scale.setScalar(1);
        backLayer.renderOrder = i * 3;

        const glass = new THREE.Mesh(sharedGeometry, glassMaterial);
        glass.name = `mesh_${i}`;
        glass.renderOrder = i * 3 + 1;

        pivot.add(backLayer, fill, glass);
        group.add(pivot);
        layoutGroup.add(group);
        items.push({ group, pivot, backLayer, fill, glass, basePosition: new THREE.Vector3(), baseRotation: new THREE.Euler() });
      }

      applyLayoutAxis();
      updateLayout();
    }

    function updateLayout() {
      const count = Math.max(1, state.count);
      const half = (count - 1) / 2;
      const arcSpan = Math.PI * 1.18;
      const radius = 3.0 * state.spacing;
      const startAngle = THREE.MathUtils.degToRad(state.layoutStartAngle);

      const facingRotation = (angle) => {
        if (state.layoutFacing === 'same direction') return 0;
        if (state.layoutFacing === 'inward') return -angle;
        if (state.layoutFacing === 'outward') return -angle + Math.PI;
        return -angle + Math.PI / 2;
      };

      items.forEach((item, i) => {
        const t = count === 1 ? 0.5 : i / (count - 1);
        const closedT = i / count;
        const centered = i - half;
        const position = item.basePosition;
        const rotation = item.baseRotation;
        position.set(0, 0, 0);
        rotation.set(0, 0, 0);
        item.group.scale.setScalar(1);

        if (state.layout === 'custom') {
          const data = customTransforms[i] || defaultCustomTransform(i);
          position.set(data.x, data.y, data.z);
          rotation.set(
            THREE.MathUtils.degToRad(data.rx),
            THREE.MathUtils.degToRad(data.ry),
            THREE.MathUtils.degToRad(data.rz)
          );
          item.group.scale.setScalar(data.scale);
        }

        if (state.layout === 'line') {
          const wave = Math.sin((t - 0.5) * Math.PI * 2 * state.lineWaveFrequency) * state.lineWaveAmount;
          position.set(centered * state.lineSpacingX * state.spacing, 0, centered * state.lineSpacingZ * state.spacing + wave);
          rotation.y = state.layoutFacing === 'same direction' ? 0 : -0.18 - wave * 0.08;
        }

        if (state.layout === 'arc') {
          const a = startAngle + (t - 0.5) * arcSpan;
          position.set(Math.sin(a) * radius, 0, Math.cos(a) * radius * 0.48);
          rotation.y = facingRotation(a);
        }

        if (state.layout === 'ring') {
          const a = startAngle + closedT * Math.PI * 2;
          const ringRadius = 2.75 * state.spacing;
          position.set(Math.cos(a) * ringRadius, 0, Math.sin(a) * ringRadius);
          rotation.y = facingRotation(a);
        }

        item.group.position.copy(position);
        item.group.rotation.copy(rotation);
      });
    }

    function applyLook() {
      const gloss = state.gloss;
      scene.background.set(state.backgroundColor);
      backdropMaterial.uniforms.base.value.set(state.backgroundColor);
      backdropMaterial.uniforms.top.value.set(state.backgroundColor).lerp(new THREE.Color('#ffffff'), 0.28);
      const autoEdge = new THREE.Color(state.objectColor).lerp(new THREE.Color('#ffffff'), 0.35);
      rimLight.color.copy(autoEdge);

      glassMaterial.color.set(state.objectColor);
      glassMaterial.opacity = state.opacity;
      glassMaterial.transmission = 0.25 + gloss * 0.7;
      glassMaterial.roughness = 0.55 - gloss * 0.5;
      glassMaterial.reflectivity = 0.2 + gloss * 0.8;
      glassMaterial.clearcoat = 0.35 + gloss * 0.65;
      glassMaterial.clearcoatRoughness = 0.28 - gloss * 0.24;
      glassMaterial.thickness = 0.25 + gloss * 0.8;
      glassMaterial.userData.uniforms.panelBaseColor.value.set(state.objectColor);
      glassMaterial.userData.uniforms.panelGradientColor.value.set(state.panelGradientColor);
      glassMaterial.userData.uniforms.panelGradientAmount.value = state.panelGradientAmount;
      glassMaterial.userData.uniforms.panelGradientDirection.value = { horizontal: 0, vertical: 1, diagonal: 2 }[state.panelGradientDirection] ?? 2;

      fillMaterial.color.set(state.objectColor);
      fillMaterial.opacity = Math.min(0.28, 0.06 + state.opacity * 0.16);
      backLayerMaterial.color.set(state.objectColor).lerp(new THREE.Color(state.panelGradientColor), 0.45);
      backLayerMaterial.opacity = state.backLayer ? state.backLayerOpacity : 0;
      items.forEach((item) => {
        item.backLayer.visible = state.backLayer && state.backLayerOpacity > 0;
        item.backLayer.material.opacity = state.backLayer ? state.backLayerOpacity : 0;
        item.backLayer.material.color.copy(backLayerMaterial.color);
        item.backLayer.position.z = -state.thickness * (0.18 + state.backLayerBlur * 0.25);
        item.backLayer.scale.setScalar(1);
      });
    }

    function updateCameraProjection() {
      camera.fov = THREE.MathUtils.lerp(30, 78, state.perspectiveStrength);
      camera.updateProjectionMatrix();
    }

    function cameraViewFor(preset) {
      const perspectiveDolly = THREE.MathUtils.lerp(1.15, 0.55, state.perspectiveStrength);
      const distance = 8.5 * perspectiveDolly / state.zoom;
      const upY = new THREE.Vector3(0, 1, 0);
      if (preset === 'front') {
        return { position: new THREE.Vector3(0, 0, distance), up: upY };
      }
      if (preset === 'top') {
        return { position: new THREE.Vector3(0, distance, 0), up: new THREE.Vector3(0, 0, -1) };
      }
      if (preset === 'side') {
        return { position: new THREE.Vector3(distance, 0, 0), up: upY };
      }
      if (preset === 'isometric') {
        return { position: new THREE.Vector3(distance * 0.72, distance * 0.72, distance * 0.72), up: upY };
      }
      if (preset === 'custom') {
        const yaw = THREE.MathUtils.degToRad(state.cameraYaw);
        const pitch = THREE.MathUtils.degToRad(state.cameraPitch);
        const horizontal = Math.cos(pitch) * distance;
        return {
          position: new THREE.Vector3(
            Math.sin(yaw) * horizontal,
            Math.sin(pitch) * distance,
            Math.cos(yaw) * horizontal
          ),
          up: upY
        };
      }
      return { position: new THREE.Vector3(distance * 0.62, distance * 0.36, distance * 0.82), up: upY };
    }

    function moveCamera(preset, smooth) {
      updateCameraProjection();
      const view = cameraViewFor(preset);
      const helper = camera.clone();
      helper.position.copy(view.position);
      helper.up.copy(view.up);
      helper.lookAt(target);
      applyCameraRoll(helper, state.cameraRoll);
      if (!smooth) {
        camera.position.copy(view.position);
        camera.up.copy(view.up);
        camera.quaternion.copy(helper.quaternion);
        controls.target.copy(target);
        controls.update();
        return;
      }
      cameraTween = {
        from: camera.position.clone(),
        to: view.position,
        fromQuaternion: camera.quaternion.clone(),
        toQuaternion: helper.quaternion.clone(),
        fromUp: camera.up.clone(),
        toUp: view.up,
        time: 0,
        duration: 0.7
      };
    }

    function applyCameraRoll(cam, degrees) {
      if (!degrees) return;
      const forward = new THREE.Vector3();
      cam.getWorldDirection(forward);
      const rollQuat = new THREE.Quaternion().setFromAxisAngle(forward.normalize(), THREE.MathUtils.degToRad(degrees));
      cam.quaternion.premultiply(rollQuat);
      cam.up.applyQuaternion(rollQuat).normalize();
    }

    function updateCameraTween(dt) {
      if (!cameraTween) return;
      cameraTween.time += dt;
      const raw = Math.min(1, cameraTween.time / cameraTween.duration);
      const t = raw * raw * (3 - 2 * raw);
      camera.position.lerpVectors(cameraTween.from, cameraTween.to, t);
      camera.quaternion.slerpQuaternions(cameraTween.fromQuaternion, cameraTween.toQuaternion, t);
      camera.up.lerpVectors(cameraTween.fromUp, cameraTween.toUp, t).normalize();
      controls.target.copy(target);
      controls.update();
      if (raw >= 1) {
        camera.position.copy(cameraTween.to);
        camera.quaternion.copy(cameraTween.toQuaternion);
        camera.up.copy(cameraTween.toUp);
        cameraTween = null;
      }
    }

    function selectedCanvasPreset() {
      return canvasPresets[state.canvasSize] || canvasPresets['16:9 Widescreen'];
    }

    function resize() {
      const [ratioW, ratioH] = selectedCanvasPreset();
      const availableW = Math.max(1, view.clientWidth - 44);
      const availableH = Math.max(1, view.clientHeight - 44);
      const ratio = ratioW / ratioH;
      let w = availableW;
      let h = w / ratio;
      if (h > availableH) {
        h = availableH;
        w = h * ratio;
      }
      renderer.setSize(Math.round(w), Math.round(h), false);
      canvas.style.width = `${Math.round(w)}px`;
      canvas.style.height = `${Math.round(h)}px`;
      camera.aspect = w / Math.max(1, h);
      updateCameraProjection();
    }

    function downloadDataURL(dataURL, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataURL;
      link.click();
    }

    function renderStill({ transparent = false } = {}) {
      const wasVisible = backdropMesh.visible;
      const oldBackground = scene.background;
      if (transparent) {
        backdropMesh.visible = false;
        scene.background = null;
        renderer.setClearColor(0x000000, 0);
      }
      renderer.render(scene, camera);
      const dataURL = renderer.domElement.toDataURL(transparent ? 'image/png' : 'image/jpeg', transparent ? 1 : 0.94);
      if (transparent) {
        backdropMesh.visible = wasVisible;
        scene.background = oldBackground;
        renderer.setClearColor(0x000000, 1);
        renderer.render(scene, camera);
      }
      return dataURL;
    }

    function exportJPG() {
      downloadDataURL(renderStill(), `glass-plates-${state.canvasSize.split(' ')[0]}-${Date.now()}.jpg`);
    }

    function exportPNGObject() {
      downloadDataURL(renderStill({ transparent: true }), `glass-plates-object-${Date.now()}.png`);
    }

    function recordVideo() {
      if (!canvas.captureStream || typeof MediaRecorder === 'undefined') return;
      const mp4Type = 'video/mp4;codecs=h264';
      const webmType = 'video/webm;codecs=vp9';
      const mimeType = MediaRecorder.isTypeSupported(mp4Type)
        ? mp4Type
        : (MediaRecorder.isTypeSupported(webmType) ? webmType : 'video/webm');
      const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
      const stream = canvas.captureStream(30);
      const chunks = [];
      const recorder = new MediaRecorder(stream, { mimeType });
      recorder.ondataavailable = (event) => {
        if (event.data.size) chunks.push(event.data);
      };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        downloadDataURL(url, `glass-plates-${Date.now()}.${extension}`);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };
      recorder.start();
      setTimeout(() => recorder.stop(), 5000);
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;
      if (state.motion && state.groupRotate) masterGroup.rotation.y += state.groupSpeed * dt;
      items.forEach((item, i) => {
        const phase = i * state.selfSpinOffset;
        const baseX = THREE.MathUtils.degToRad(state.shapeRotX);
        const baseY = THREE.MathUtils.degToRad(state.shapeRotY);
        const baseZ = THREE.MathUtils.degToRad(state.shapeRotZ);
        item.pivot.rotation.order = 'YXZ';
        item.pivot.rotation.x = baseX + (state.motion && state.selfSpin ? Math.sin(elapsed * 0.35 + phase) * 0.08 : 0);
        item.pivot.rotation.y = baseY + (state.motion && state.selfSpin ? elapsed * state.selfSpeed + phase : 0);
        item.pivot.rotation.z = baseZ;
      });
      updateCameraTween(dt);
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    buildUI();
    themeToggle.addEventListener('click', () => {
      state.lightUI = !state.lightUI;
      applyTheme();
    });
    applyTheme();
    refreshConditionalUI();
    applyLook();
    rebuildItems();
    resize();
    moveCamera(state.cameraPreset, false);
    animate();
  </script>
</body>
</html>
