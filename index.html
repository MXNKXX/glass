    function applyTheme() {
      document.body.classList.toggle('light', state.lightUI);
      document.body.classList.toggle('dark', !state.lightUI);
      themeToggle.textContent = state.lightUI ? 'Dark' : 'Light';
      themeToggle.setAttribute('aria-pressed', String(state.lightUI));
    }

    function refreshConditionalUI() {
      controlEntries.forEach((entry) => {
        if (entry.section && entry.box) {
          const sectionVisible = entry.section.showWhen ? entry.section.showWhen() : true;
          const hasVisibleControl = entry.controls.some((controlEntry) => !controlEntry.element.classList.contains('is-hidden'));
          entry.box.classList.toggle('is-hidden', !sectionVisible || !hasVisibleControl);
          return;
        }
        const visible = entry.control.showWhen ? entry.control.showWhen() : true;
        entry.element.classList.toggle('is-hidden', !visible);
      });
    }

    function formatValue(value, step = 0.01) {
      if (Number.isInteger(value)) return String(value);
      const stepText = String(step);
      const decimals = stepText.includes('.') ? stepText.split('.')[1].length : 0;
      return Number(value).toFixed(Math.min(4, Math.max(2, decimals)));
    }

    function normalizeHex(value) {
      const raw = String(value).trim();
      const withHash = raw.startsWith('#') ? raw : `#${raw}`;
      if (/^#[0-9a-fA-F]{6}$/.test(withHash)) return withHash.toLowerCase();
      if (/^#[0-9a-fA-F]{3}$/.test(withHash)) {
        return `#${withHash[1]}${withHash[1]}${withHash[2]}${withHash[2]}${withHash[3]}${withHash[3]}`.toLowerCase();
      }
      return null;
    }

    function colorWithSaturation(hex, amount) {
      const color = new THREE.Color(hex);
      const hsl = { h: 0, s: 0, l: 0 };
      color.getHSL(hsl);
      hsl.s = THREE.MathUtils.clamp(hsl.s * amount, 0, 1);
      color.setHSL(hsl.h, hsl.s, hsl.l);
      return color;
    }

    function hexToRgb(hex) {
      const normalized = normalizeHex(hex) || '#000000';
      return {
        r: parseInt(normalized.slice(1, 3), 16),
        g: parseInt(normalized.slice(3, 5), 16),
        b: parseInt(normalized.slice(5, 7), 16)
      };
    }

    function rgbToHex(r, g, b) {
      const clampByte = (value) => Math.min(255, Math.max(0, Math.round(value)));
      return `#${[clampByte(r), clampByte(g), clampByte(b)].map((value) => value.toString(16).padStart(2, '0')).join('')}`;
    }

    function rgbToHsv(r, g, b) {
      const rn = r / 255;
      const gn = g / 255;
      const bn = b / 255;
      const max = Math.max(rn, gn, bn);
      const min = Math.min(rn, gn, bn);
      const delta = max - min;
      let h = 0;
      if (delta > 0) {
        if (max === rn) h = ((gn - bn) / delta) % 6;
        else if (max === gn) h = (bn - rn) / delta + 2;
        else h = (rn - gn) / delta + 4;
        h *= 60;
        if (h < 0) h += 360;
      }
      return { h, s: max === 0 ? 0 : delta / max, v: max };
    }

    function hsvToRgb(h, s, v) {
      const hue = ((h % 360) + 360) % 360;
      const c = v * s;
      const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
      const m = v - c;
      let r = 0;
      let g = 0;
      let b = 0;
      if (hue < 60) [r, g, b] = [c, x, 0];
      else if (hue < 120) [r, g, b] = [x, c, 0];
      else if (hue < 180) [r, g, b] = [0, c, x];
      else if (hue < 240) [r, g, b] = [0, x, c];
      else if (hue < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];
      return {
        r: (r + m) * 255,
        g: (g + m) * 255,
        b: (b + m) * 255
      };
    }

    function hsvToHex(h, s, v) {
      const rgb = hsvToRgb(h, s, v);
      return rgbToHex(rgb.r, rgb.g, rgb.b);
    }

    function randomSigned(index, salt) {
      const value = Math.sin((index + 1) * 127.1 + salt * 311.7 + state.randomSeed * 19.37) * 43758.5453;
      return (value - Math.floor(value)) * 2 - 1;
    }

    let activeColorKey = null;
    let activeColorControl = null;
    let activeColorOriginal = '#ffffff';
    let activeColor = { h: 0, s: 0, v: 1 };

    function currentPickerHex() {
      return hsvToHex(activeColor.h, activeColor.s, activeColor.v);
    }

    function clampPickerPosition(left, top) {
      const rect = colorPickerModal.getBoundingClientRect();
      const width = rect.width || 360;
      const height = rect.height || 420;
      const margin = 8;
      return {
        left: Math.min(window.innerWidth - width - margin, Math.max(margin, left)),
        top: Math.min(window.innerHeight - height - margin, Math.max(margin, top))
      };
    }

    function setPickerPosition(left, top) {
      const next = clampPickerPosition(left, top);
      colorPickerModal.style.left = `${next.left}px`;
      colorPickerModal.style.top = `${next.top}px`;
      colorPickerModal.style.right = 'auto';
      colorPickerModal.style.bottom = 'auto';
    }

    function ensurePickerInView() {
      const rect = colorPickerModal.getBoundingClientRect();
      setPickerPosition(rect.left, rect.top);
    }

    function applyActiveColorLive() {
      if (!activeColorKey || !activeColorControl) return;
      const hex = currentPickerHex();
      state[activeColorKey] = hex;
      const entry = inputs.get(activeColorKey);
      if (entry) {
        entry.input.value = hex.toUpperCase();
        if (entry.swatch) entry.swatch.style.background = hex;
      }
      onChange(activeColorControl);
    }

    function setPickerFromHex(hex) {
      const rgb = hexToRgb(hex);
      activeColor = rgbToHsv(rgb.r, rgb.g, rgb.b);
      updateColorPickerUI();
    }

    function updateColorPickerUI() {
      const rgb = hsvToRgb(activeColor.h, activeColor.s, activeColor.v);
      const hex = rgbToHex(rgb.r, rgb.g, rgb.b);
      svPlane.style.backgroundColor = hsvToHex(activeColor.h, 1, 1);
      svHandle.style.left = `${activeColor.s * 100}%`;
      svHandle.style.top = `${(1 - activeColor.v) * 100}%`;
      hueHandle.style.top = `${(activeColor.h / 360) * 100}%`;
      newPreview.style.background = hex;
      currentPreview.style.background = activeColorOriginal;
      pickerH.value = String(Math.round(activeColor.h));
      pickerS.value = String(Math.round(activeColor.s * 100));
      pickerB.value = String(Math.round(activeColor.v * 100));
      pickerR.value = String(Math.round(rgb.r));
      pickerG.value = String(Math.round(rgb.g));
      pickerBlue.value = String(Math.round(rgb.b));
      pickerHex.value = hex.slice(1).toUpperCase();
    }

    function openColorPicker(key, control) {
      activeColorKey = key;
      activeColorControl = control;
      activeColorOriginal = normalizeHex(state[key]) || '#ffffff';
      pickerTitle.textContent = control.label;
      setPickerFromHex(activeColorOriginal);
      colorPickerModal.classList.remove('is-hidden');
      colorPickerModal.setAttribute('aria-hidden', 'false');
      ensurePickerInView();
      pickerHex.focus();
      pickerHex.select();
    }

    function closeColorPicker() {
      colorPickerModal.classList.add('is-hidden');
      colorPickerModal.setAttribute('aria-hidden', 'true');
      activeColorKey = null;
      activeColorControl = null;
    }

    function commitColorPicker() {
      closeColorPicker();
    }

    function cancelColorPicker() {
      if (activeColorKey && activeColorControl) {
        state[activeColorKey] = activeColorOriginal;
        const entry = inputs.get(activeColorKey);
        if (entry) {
          entry.input.value = activeColorOriginal.toUpperCase();
          if (entry.swatch) entry.swatch.style.background = activeColorOriginal;
        }
        onChange(activeColorControl);
      }
      closeColorPicker();
    }

    function applySvFromEvent(event) {
      const rect = svPlane.getBoundingClientRect();
      activeColor.s = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      activeColor.v = 1 - Math.min(1, Math.max(0, (event.clientY - rect.top) / rect.height));
      updateColorPickerUI();
      applyActiveColorLive();
    }

    function applyHueFromEvent(event) {
      const rect = hueBar.getBoundingClientRect();
      activeColor.h = Math.min(360, Math.max(0, ((event.clientY - rect.top) / rect.height) * 360));
      updateColorPickerUI();
      applyActiveColorLive();
    }

    svPlane.addEventListener('pointerdown', (event) => {
      svPlane.setPointerCapture(event.pointerId);
      applySvFromEvent(event);
    });
    svPlane.addEventListener('pointermove', (event) => {
      if (svPlane.hasPointerCapture(event.pointerId)) applySvFromEvent(event);
    });
    hueBar.addEventListener('pointerdown', (event) => {
      hueBar.setPointerCapture(event.pointerId);
      applyHueFromEvent(event);
    });
    hueBar.addEventListener('pointermove', (event) => {
      if (hueBar.hasPointerCapture(event.pointerId)) applyHueFromEvent(event);
    });

    pickerTitle.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;
      const rect = colorPickerModal.getBoundingClientRect();
      pickerDrag = {
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top
      };
      pickerTitle.setPointerCapture(event.pointerId);
      event.preventDefault();
    });
    pickerTitle.addEventListener('pointermove', (event) => {
      if (!pickerDrag || pickerDrag.pointerId !== event.pointerId) return;
      setPickerPosition(event.clientX - pickerDrag.offsetX, event.clientY - pickerDrag.offsetY);
    });
    pickerTitle.addEventListener('pointerup', (event) => {
      if (!pickerDrag || pickerDrag.pointerId !== event.pointerId) return;
      pickerTitle.releasePointerCapture(event.pointerId);
      pickerDrag = null;
    });
    pickerTitle.addEventListener('pointercancel', () => {
      pickerDrag = null;
    });

    [pickerH, pickerS, pickerB].forEach((input) => {
      input.addEventListener('change', () => {
        activeColor.h = Math.min(360, Math.max(0, Number(pickerH.value) || 0));
        activeColor.s = Math.min(1, Math.max(0, (Number(pickerS.value) || 0) / 100));
        activeColor.v = Math.min(1, Math.max(0, (Number(pickerB.value) || 0) / 100));
        updateColorPickerUI();
        applyActiveColorLive();
      });
    });

    [pickerR, pickerG, pickerBlue].forEach((input) => {
      input.addEventListener('change', () => {
        const rgb = {
          r: Math.min(255, Math.max(0, Number(pickerR.value) || 0)),
          g: Math.min(255, Math.max(0, Number(pickerG.value) || 0)),
          b: Math.min(255, Math.max(0, Number(pickerBlue.value) || 0))
        };
        activeColor = rgbToHsv(rgb.r, rgb.g, rgb.b);
        updateColorPickerUI();
        applyActiveColorLive();
      });
    });

    pickerHex.addEventListener('change', () => {
      const normalized = normalizeHex(pickerHex.value);
      if (normalized) {
        setPickerFromHex(normalized);
        applyActiveColorLive();
      }
      else updateColorPickerUI();
    });
    pickerHex.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') commitColorPicker();
    });
    pickerOk.addEventListener('click', commitColorPicker);
    pickerCancel.addEventListener('click', cancelColorPicker);
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !colorPickerModal.classList.contains('is-hidden')) cancelColorPicker();
      if (event.key === 'Escape' && exportDrawer.classList.contains('is-open')) setExportDrawer(false);
    });

    function syncUI() {
      inputs.forEach((entry, key) => {
        const value = state[key];
        if (entry.input.type === 'checkbox') {
          entry.input.checked = Boolean(value);
        } else if (entry.picker) {
          entry.input.value = String(value).toUpperCase();
          if (entry.swatch) entry.swatch.style.background = value;
        } else {
          entry.input.value = value;
        }
        if (entry.value) entry.value.value = formatValue(value, entry.control.step);
      });
      updateExportSummary();
    }

    function onChange(control) {
      if (control.key === 'layout' && state.layout === 'line') {
        state.layoutFacing = 'same direction';
        state.panelAspect = 1;
        state.lineSpacingX = 1.35;
        state.lineSpacingZ = 0;
        state.lineWaveAmount = 0.42;
        state.lineWaveDepth = 0.28;
        state.lineWaveFrequency = 1.25;
        state.lineWaveStyle = 'flow';
        state.lineWaveSpeed = 1.15;
        state.sizeVariation = 0;
        state.tiltVariation = 0;
        state.axisRotX = 0;
        state.axisRotY = 0;
        state.axisRotZ = 0;
        state.rotationPreset = 'side 90deg';
        state.shapeRotX = 0;
        state.shapeRotY = 90;
        state.shapeRotZ = 0;
        masterGroup.rotation.set(0, 0, 0);
        orbitGroup.rotation.set(0, 0, 0);
        syncUI();
        rebuildItems();
      }
      if (control.key === 'groupRotateMode') {
        masterGroup.rotation.set(0, 0, 0);
        orbitGroup.rotation.set(0, 0, 0);
      }
      if (control.key === 'selfSpinTiming') {
        syncUI();
      }
      if (control.rotationPreset && state.rotationPreset !== 'custom') {
        const values = rotationPresets[state.rotationPreset];
        if (values) {
          [state.shapeRotX, state.shapeRotY, state.shapeRotZ] = values;
          syncUI();
        }
      }
      if (['shapeRotX', 'shapeRotY', 'shapeRotZ'].includes(control.key)) {
        state.rotationPreset = 'custom';
        syncUI();
      }
      if (control.key === 'cameraPreset' && state.cameraPreset !== 'custom') {
        const values = cameraAngles[state.cameraPreset];
        if (values) {
          [state.cameraYaw, state.cameraPitch, state.cameraRoll] = values;
          syncUI();
        }
      }
      if (control.cameraManual) {
        state.cameraPreset = 'custom';
        syncUI();
      }
      if (control.key === 'canvasSize' && state.canvasSize !== 'Custom') {
        const presetSize = canvasPresets[state.canvasSize];
        if (presetSize) {
          [state.canvasWidth, state.canvasHeight] = presetSize;
          syncUI();
        }
      }
      if (['canvasWidth', 'canvasHeight'].includes(control.key)) {
        state.canvasWidth = THREE.MathUtils.clamp(Math.round(state.canvasWidth), 320, 4096);
        state.canvasHeight = THREE.MathUtils.clamp(Math.round(state.canvasHeight), 320, 4096);
        state.canvasSize = 'Custom';
        syncUI();
      }
      if (control.rebuild) rebuildItems();
      if (control.camera) moveCamera(state.cameraPreset, true);
      if (control.canvas) resize();
      updateFocusBlur();
      applyLook();
      applyLayoutAxis();
      updateLayout();
      updateExportSummary();
      refreshConditionalUI();
    }

    function rollRandomVariation() {
      state.randomSeed += 1;
      updateLayout();
    }

    function applyLayoutAxis() {
      layoutGroup.rotation.order = 'YXZ';
      layoutGroup.rotation.set(
        THREE.MathUtils.degToRad(state.axisRotX),
        THREE.MathUtils.degToRad(state.axisRotY),
        THREE.MathUtils.degToRad(state.axisRotZ)
      );
    }

    function roundedRectShape(width, height, radius) {
      const x = -width / 2;
      const y = -height / 2;
      const r = Math.min(radius, width * .45, height * .45);
      const shape = new THREE.Shape();
      shape.moveTo(x + r, y);
      shape.lineTo(x + width - r, y);
      shape.quadraticCurveTo(x + width, y, x + width, y + r);
      shape.lineTo(x + width, y + height - r);
      shape.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      shape.lineTo(x + r, y + height);
      shape.quadraticCurveTo(x, y + height, x, y + height - r);
      shape.lineTo(x, y + r);
      shape.quadraticCurveTo(x, y, x + r, y);
      return shape;
    }

    function getPanelDimensions() {
      const aspect = Math.max(0.05, state.panelAspect);
      const width = state.panelSize * Math.sqrt(aspect);
      const height = state.panelSize / Math.sqrt(aspect);
      return { width, height };
    }

    function createDiscGeometry(width, height) {
      if (state.discInflate <= 0.001) {
        const halfDepth = state.thickness * 0.5;
        const minDimension = Math.min(width, height);
        const edge = THREE.MathUtils.clamp(state.discEdgeRound, 0, 1);
        const bevelRadius = Math.min(0.24, edge * 0.22);
        const bevelDepth = Math.min(halfDepth * 0.92, minDimension * edge * 0.13);
        const profile = [];

        if (bevelRadius <= 0.001 || bevelDepth <= 0.001) {
          profile.push(
            new THREE.Vector2(0, halfDepth),
            new THREE.Vector2(0.5, halfDepth),
            new THREE.Vector2(0.5, -halfDepth),
            new THREE.Vector2(0, -halfDepth)
          );
        } else {
          const steps = 12;
          profile.push(new THREE.Vector2(0, halfDepth));
          profile.push(new THREE.Vector2(0.5 - bevelRadius, halfDepth));
          for (let i = 0; i <= steps; i++) {
            const a = (i / steps) * Math.PI * 0.5;
            profile.push(new THREE.Vector2(
              0.5 - bevelRadius + Math.sin(a) * bevelRadius,
              halfDepth - (1 - Math.cos(a)) * bevelDepth
            ));
          }
          profile.push(new THREE.Vector2(0.5, -halfDepth + bevelDepth));
          for (let i = 0; i <= steps; i++) {
            const a = (i / steps) * Math.PI * 0.5;
            profile.push(new THREE.Vector2(
              0.5 - (1 - Math.cos(a)) * bevelRadius,
              -halfDepth + bevelDepth - Math.sin(a) * bevelDepth
            ));
          }
          profile.push(new THREE.Vector2(0, -halfDepth));
        }

        const geometry = new THREE.LatheGeometry(profile, 128);
        geometry.rotateX(Math.PI / 2);
        geometry.scale(width, height, 1);
        geometry.computeVertexNormals();
        return geometry;
      }

      const minDimension = Math.min(width, height);
      const halfDepth = state.thickness * 0.5 + minDimension * 0.16 * state.discInflate;
      const profile = [];
      const profileSteps = 34;
      for (let i = 0; i <= profileSteps; i++) {
        const angle = (i / profileSteps) * Math.PI;
        const radius = Math.sin(angle) * 0.5;
        const depth = Math.cos(angle) * halfDepth;
        profile.push(new THREE.Vector2(radius, depth));
      }

      const geometry = new THREE.LatheGeometry(profile, 128);
      geometry.rotateX(Math.PI / 2);
      geometry.scale(width, height, 1);
      geometry.computeVertexNormals();
      return geometry;
    }

    function createMainGeometry() {
      const { width, height } = getPanelDimensions();
      if (state.shape === 'disc') {
        return createDiscGeometry(width, height);
      }

      const cornerRadius = Math.min(width, height) * state.cornerRadius;
      const geometry = new THREE.ExtrudeGeometry(roundedRectShape(width, height, cornerRadius), {
        depth: state.thickness,
        bevelEnabled: true,
        bevelSize: Math.min(0.035, state.thickness * 0.42),
        bevelThickness: Math.min(0.035, state.thickness * 0.42),
        bevelSegments: 5,
        curveSegments: 16,
        steps: 1
      });
      geometry.center();
      geometry.computeVertexNormals();
      return geometry;
    }

    function rebuildItems() {
      items.forEach((item) => orbitGroup.remove(item.group));
      items = [];
      if (sharedGeometry) sharedGeometry.dispose();
      sharedGeometry = createMainGeometry();
      syncUI();

      for (let i = 0; i < state.count; i++) {
        const group = new THREE.Group();
        group.name = `itemGroup_${i}`;
        const pivot = new THREE.Group();
        pivot.name = `shapePivot_${i}`;

        const fill = new THREE.Mesh(sharedGeometry, fillMaterial);
        fill.name = `fill_${i}`;
        fill.scale.setScalar(0.985);
        fill.renderOrder = i * 3;

        const glass = new THREE.Mesh(sharedGeometry, glassMaterial);
        glass.name = `mesh_${i}`;
        glass.renderOrder = i * 3 + 1;

        pivot.add(fill, glass);
        group.add(pivot);
        orbitGroup.add(group);
        items.push({ group, pivot, fill, glass, basePosition: new THREE.Vector3(), baseRotation: new THREE.Euler() });
      }

      applyLayoutAxis();
      updateLayout();
    }

    function updateLayout() {
      const count = Math.max(1, state.count);
      const half = (count - 1) / 2;
      const startAngle = THREE.MathUtils.degToRad(state.layoutStartAngle);

      const facingRotation = (angle) => {
        if (state.layoutFacing === 'same direction') return 0;
        if (state.layoutFacing === 'inward') return -angle;
        if (state.layoutFacing === 'outward') return -angle + Math.PI;
        return -angle + Math.PI / 2;
      };

      items.forEach((item, i) => {
        const t = count === 1 ? 0.5 : i / (count - 1);
        const closedT = i / count;
        const centered = i - half;
        const position = item.basePosition;
        const rotation = item.baseRotation;
        position.set(0, 0, 0);
        rotation.set(0, 0, 0);
        const randomScale = Math.max(0.22, 1 + randomSigned(i, 1) * state.sizeVariation);
        const randomTilt = THREE.MathUtils.degToRad(state.tiltVariation);
        item.group.scale.setScalar(randomScale);

        if (state.layout === 'line') {
          position.set(
            centered * state.lineSpacingX * state.spacing,
            0,
            centered * state.lineSpacingZ * state.spacing
          );
          rotation.y = state.layoutFacing === 'same direction' ? 0 : -0.18;
        }

        if (state.layout === 'ring') {
          const a = startAngle + closedT * Math.PI * 2;
          const ringRadius = 2.75 * state.spacing;
          position.set(Math.cos(a) * ringRadius, 0, Math.sin(a) * ringRadius);
          rotation.y = facingRotation(a);
        }

        if (state.layout === 'coil') {
          const a = startAngle + t * Math.PI * 2 * state.coilTurns;
          const radius = state.coilRadius * state.spacing;
          const coilLength = Math.max(0.01, state.coilTurns * state.coilGap * state.spacing);
          position.set(
            (t - 0.5) * coilLength,
            Math.cos(a) * radius,
            Math.sin(a) * radius
          );
          const tangent = new THREE.Vector3(
            coilLength,
            -Math.sin(a) * radius * Math.PI * 2 * state.coilTurns,
            Math.cos(a) * radius * Math.PI * 2 * state.coilTurns
          ).normalize();
          const lookMatrix = new THREE.Matrix4().lookAt(position, position.clone().add(tangent), new THREE.Vector3(0, 1, 0));
          rotation.setFromRotationMatrix(lookMatrix, 'YXZ');
          rotation.z += Math.PI / 2;
        }

        if (state.layout === 'spiral') {
          const a = startAngle + t * Math.PI * 2 * state.spiralTurns;
          const radius = (0.25 + t * 3.15 * state.spiralSpread) * state.spacing;
          position.set(Math.cos(a) * radius, 0, Math.sin(a) * radius);
          rotation.y = facingRotation(a + Math.PI * 0.08);
          rotation.z = Math.sin(t * Math.PI * 2) * 0.05;
        }

        rotation.x += randomSigned(i, 2) * randomTilt;
        rotation.y += randomSigned(i, 3) * randomTilt * 0.55;
        rotation.z += randomSigned(i, 4) * randomTilt;

        item.group.position.copy(position);
        item.group.rotation.copy(rotation);
        if (state.layout === 'line') applyLineWave(item, i, 0);
      });
    }

    function applyLineWave(item, i, time) {
      const count = Math.max(1, state.count);
      const t = count === 1 ? 0.5 : i / (count - 1);
      const wavePhase = (t - 0.5) * Math.PI * 2 * state.lineWaveFrequency + time;
      const liftMode = state.lineWaveStyle === 'lift';
      let wave = Math.sin(wavePhase) * state.lineWaveAmount;
      const depthWave = liftMode ? 0 : Math.cos(wavePhase) * state.lineWaveDepth;
      if (liftMode) {
        const pulsePhase = ((time * 0.55 - t) % 1 + 1) % 1;
        const rise = THREE.MathUtils.smoothstep(pulsePhase, 0.02, 0.16);
        const fall = 1 - THREE.MathUtils.smoothstep(pulsePhase, 0.2, 0.42);
        wave = Math.max(0, rise * fall) * state.lineWaveAmount;
      }

      item.group.position.set(
        item.basePosition.x,
        item.basePosition.y + wave,
        item.basePosition.z + depthWave
      );
      item.group.rotation.copy(item.baseRotation);
      item.group.rotation.y += state.layoutFacing === 'same direction' ? 0 : -depthWave * 0.08;
      item.group.rotation.z += liftMode ? 0 : wave * 0.08;
    }

    function applyCoilFlow(item, i, time) {
      const count = Math.max(1, state.count);
      const t = count === 1 ? 0.5 : (((i / count) + time) % 1 + 1) % 1;
      const startAngle = THREE.MathUtils.degToRad(state.layoutStartAngle);
      const a = startAngle + t * Math.PI * 2 * state.coilTurns;
      const radius = state.coilRadius * state.spacing;
      const coilLength = Math.max(0.01, state.coilTurns * state.coilGap * state.spacing);
      const position = new THREE.Vector3(
        (t - 0.5) * coilLength,
        Math.cos(a) * radius,
        Math.sin(a) * radius
      );
      const tangent = new THREE.Vector3(
        coilLength,
        -Math.sin(a) * radius * Math.PI * 2 * state.coilTurns,
        Math.cos(a) * radius * Math.PI * 2 * state.coilTurns
      ).normalize();
      const rotation = new THREE.Euler(0, 0, 0, 'YXZ');
      const lookMatrix = new THREE.Matrix4().lookAt(position, position.clone().add(tangent), new THREE.Vector3(0, 1, 0));
      rotation.setFromRotationMatrix(lookMatrix, 'YXZ');
      rotation.z += Math.PI / 2;
      const randomTilt = THREE.MathUtils.degToRad(state.tiltVariation);
      rotation.x += randomSigned(i, 2) * randomTilt;
      rotation.y += randomSigned(i, 3) * randomTilt * 0.55;
      rotation.z += randomSigned(i, 4) * randomTilt;
      item.group.position.copy(position);
      item.group.rotation.copy(rotation);
    }

    function applyLook() {
      const gloss = state.gloss;
      const backgroundColor = colorWithSaturation(state.backgroundColor, state.backgroundSaturation);
      const objectColor = colorWithSaturation(state.objectColor, state.objectSaturation);
      const panelGradientColor = colorWithSaturation(state.panelGradientColor, state.objectSaturation);
      const toneShadowColor = colorWithSaturation(state.toneShadowColor, state.objectSaturation);
      const toneMidColor = colorWithSaturation(state.toneMidColor, state.objectSaturation);
      const toneHighlightColor = colorWithSaturation(state.toneHighlightColor, state.objectSaturation);
      scene.background.copy(backgroundColor);
      backdropMaterial.color.copy(backgroundColor);
      const autoEdge = objectColor.clone().lerp(new THREE.Color('#ffffff'), 0.35);
      rimLight.color.copy(autoEdge);
      const solidGloss = state.materialStyle === 'solid gloss';
      const chrome = state.materialStyle === 'chrome';
      const glassDensity = solidGloss || chrome ? 0 : state.opacity;
      const glassSolidify = solidGloss || chrome ? 0 : state.glassSolidify;
      const toneMapStrength = solidGloss ? 1 : 0;

      glassMaterial.color.copy(objectColor);
      glassMaterial.transparent = !(solidGloss || chrome);
      glassMaterial.opacity = solidGloss || chrome ? 1 : state.opacity;
      glassMaterial.transmission = solidGloss || chrome ? 0 : Math.max(0, 0.18 + gloss * 0.58 - glassDensity * 0.08 - glassSolidify * 0.7);
      glassMaterial.metalness = chrome ? 0.74 : 0;
      glassMaterial.roughness = chrome ? Math.max(0.035, 0.2 - gloss * 0.12) : solidGloss ? 0.32 - gloss * 0.27 : Math.max(0.035, 0.42 - gloss * 0.36 - glassSolidify * 0.04);
      glassMaterial.reflectivity = chrome ? 1 : solidGloss ? 0.35 + gloss * 0.45 : Math.min(1, 0.42 + gloss * 0.55 + glassSolidify * 0.18);
      glassMaterial.clearcoat = chrome ? 1 : solidGloss ? 0.65 + gloss * 0.35 : Math.min(1, 0.55 + gloss * 0.45 + glassSolidify * 0.16);
      glassMaterial.clearcoatRoughness = chrome ? Math.max(0.01, 0.08 - gloss * 0.06) : solidGloss ? 0.18 - gloss * 0.14 : Math.max(0.018, 0.16 - gloss * 0.12 - glassSolidify * 0.04);
      glassMaterial.specularIntensity = chrome ? 1 : solidGloss ? 0.55 + gloss * 0.45 : Math.min(1, 0.62 + gloss * 0.38 + glassSolidify * 0.18);
      glassMaterial.specularColor.copy(solidGloss ? toneHighlightColor : new THREE.Color('#ffffff'));
      glassMaterial.envMap = chrome ? chromeReflectionTarget.texture : null;
      glassMaterial.envMapIntensity = chrome ? 2.15 : 1;
      glassMaterial.thickness = solidGloss || chrome ? 0 : 0.45 + glassDensity * 0.75 + gloss * 0.35;
      glassMaterial.depthWrite = solidGloss || chrome;
      glassMaterial.userData.uniforms.panelBaseColor.value.copy(objectColor);
      glassMaterial.userData.uniforms.panelGradientColor.value.copy(panelGradientColor);
      glassMaterial.userData.uniforms.panelGradientAmount.value = state.panelGradientAmount;
      glassMaterial.userData.uniforms.panelGradientDirection.value = {
        horizontal: 0,
        vertical: 1,
        diagonal: 2,
        'horizontal reverse': 3,
        'vertical reverse': 4,
        'diagonal reverse': 5
      }[state.panelGradientDirection] ?? 2;
      glassMaterial.userData.uniforms.toneMapEnabled.value = state.toneMap && solidGloss ? 1 : 0;
      glassMaterial.userData.uniforms.toneShadowColor.value.copy(toneShadowColor);
      glassMaterial.userData.uniforms.toneMidColor.value.copy(toneMidColor);
      glassMaterial.userData.uniforms.toneHighlightColor.value.copy(toneHighlightColor);
      glassMaterial.userData.uniforms.toneShadowLift.value = state.toneShadowLift;
      glassMaterial.userData.uniforms.toneMapAmount.value = state.toneMapAmount * toneMapStrength;
      glassMaterial.userData.uniforms.toneHighlightStrength.value = state.toneHighlightStrength * (solidGloss ? 1 : 0);
      glassMaterial.userData.uniforms.chromeMode.value = chrome ? 1 : 0;
      glassMaterial.userData.uniforms.chromeReflectColor.value.copy(autoEdge);

      const backingColor = objectColor.clone().lerp(new THREE.Color('#ffffff'), 0.14);
      fillMaterial.color.copy(backingColor);
      fillMaterial.opacity = solidGloss || chrome ? 0 : Math.min(0.58, state.glassBacking * (0.16 + state.opacity * 0.22 + glassSolidify * 0.16));
    }

    function updateChromeReflections(activeRenderer = renderer) {
      if (state.materialStyle !== 'chrome') return;
      const oldVisible = backdropMesh.visible;
      const oldBackground = scene.background;
      const oldEnvMap = glassMaterial.envMap;

      backdropMesh.visible = false;
      scene.background = chromeReflectionBackground;
      glassMaterial.envMap = chromeEnvironment;
      chromeCubeCamera.update(activeRenderer, scene);

      backdropMesh.visible = oldVisible;
      scene.background = oldBackground;
      glassMaterial.envMap = oldEnvMap;
      glassMaterial.envMap = chromeReflectionTarget.texture;
    }

    function updateCameraProjection() {
      camera.fov = THREE.MathUtils.lerp(30, 78, state.perspectiveStrength);
      camera.updateProjectionMatrix();
    }

    function cameraViewFor(preset) {
      const perspectiveDolly = THREE.MathUtils.lerp(1.15, 0.55, state.perspectiveStrength);
      const distance = 8.5 * perspectiveDolly / state.zoom;
      const upY = new THREE.Vector3(0, 1, 0);
      if (preset === 'front') {
        return { position: new THREE.Vector3(0, 0, distance), up: upY };
      }
      if (preset === 'top') {
        return { position: new THREE.Vector3(0, distance, 0), up: new THREE.Vector3(0, 0, -1) };
      }
      if (preset === 'side') {
        return { position: new THREE.Vector3(distance, 0, 0), up: upY };
      }
      if (preset === 'isometric') {
        return { position: new THREE.Vector3(distance * 0.72, distance * 0.72, distance * 0.72), up: upY };
      }
      if (preset === 'custom') {
        const yaw = THREE.MathUtils.degToRad(state.cameraYaw);
        const pitch = THREE.MathUtils.degToRad(state.cameraPitch);
        const horizontal = Math.cos(pitch) * distance;
        return {
          position: new THREE.Vector3(
            Math.sin(yaw) * horizontal,
            Math.sin(pitch) * distance,
            Math.cos(yaw) * horizontal
          ),
          up: upY
        };
      }
      return { position: new THREE.Vector3(distance * 0.62, distance * 0.36, distance * 0.82), up: upY };
    }

    function moveCamera(preset, smooth) {
      updateCameraProjection();
      const view = cameraViewFor(preset);
      const helper = camera.clone();
      helper.position.copy(view.position);
      helper.up.copy(view.up);
      helper.lookAt(target);
      applyCameraRoll(helper, state.cameraRoll);
      if (!smooth) {
        camera.position.copy(view.position);
        camera.up.copy(view.up);
        camera.quaternion.copy(helper.quaternion);
        controls.target.copy(target);
        controls.update();
        return;
      }
      cameraTween = {
        from: camera.position.clone(),
        to: view.position,
        fromQuaternion: camera.quaternion.clone(),
        toQuaternion: helper.quaternion.clone(),
        fromUp: camera.up.clone(),
        toUp: view.up,
        time: 0,
        duration: 0.7
      };
    }

    function applyCameraRoll(cam, degrees) {
      if (!degrees) return;
      const forward = new THREE.Vector3();
      cam.getWorldDirection(forward);
      const rollQuat = new THREE.Quaternion().setFromAxisAngle(forward.normalize(), THREE.MathUtils.degToRad(degrees));
      cam.quaternion.premultiply(rollQuat);
      cam.up.applyQuaternion(rollQuat).normalize();
    }

    function updateCameraTween(dt) {
      if (!cameraTween) return;
      cameraTween.time += dt;
      const raw = Math.min(1, cameraTween.time / cameraTween.duration);
      const t = raw * raw * (3 - 2 * raw);
      camera.position.lerpVectors(cameraTween.from, cameraTween.to, t);
      camera.quaternion.slerpQuaternions(cameraTween.fromQuaternion, cameraTween.toQuaternion, t);
      camera.up.lerpVectors(cameraTween.fromUp, cameraTween.toUp, t).normalize();
      controls.target.copy(target);
      controls.update();
      if (raw >= 1) {
        camera.position.copy(cameraTween.to);
        camera.quaternion.copy(cameraTween.toQuaternion);
        camera.up.copy(cameraTween.toUp);
        cameraTween = null;
      }
    }

    function selectedCanvasSize() {
      return {
        width: THREE.MathUtils.clamp(Math.round(state.canvasWidth), 320, 4096),
        height: THREE.MathUtils.clamp(Math.round(state.canvasHeight), 320, 4096)
      };
    }

    function exportDimensions() {
      const base = selectedCanvasSize();
      const scale = Number.parseFloat(state.exportScale) || 1;
      return {
        width: Math.round(base.width * scale),
        height: Math.round(base.height * scale)
      };
    }

    function updateExportSummary() {
      if (!exportSummary) return;
      const base = selectedCanvasSize();
      const output = exportDimensions();
      const scale = state.exportScale || '1x';
      const value = exportSummary.querySelector('.export-summary-value');
      if (value) {
        value.textContent = `${output.width} × ${output.height} · ${scale} from ${base.width} × ${base.height}`;
      }
    }

    function resize() {
      const { width: ratioW, height: ratioH } = selectedCanvasSize();
      const availableW = Math.max(1, view.clientWidth - 44);
      const availableH = Math.max(1, view.clientHeight - 44);
      const ratio = ratioW / ratioH;
      let w = availableW;
      let h = w / ratio;
      if (h > availableH) {
        h = availableH;
        w = h * ratio;
      }
      renderer.setSize(Math.round(w), Math.round(h), false);
      composer.setSize(Math.round(w), Math.round(h));
      canvas.style.width = `${Math.round(w)}px`;
      canvas.style.height = `${Math.round(h)}px`;
      camera.aspect = w / Math.max(1, h);
      updateCameraProjection();
    }

    function updateFocusBlur() {
      bokehPass.enabled = Boolean(state.focusBlur);
      if (!bokehPass.uniforms) return;
      bokehPass.uniforms.focus.value = state.focusDistance;
      bokehPass.uniforms.aperture.value = 0.00018 + state.focusAmount * 0.0018;
      bokehPass.uniforms.maxblur.value = 0.004 + state.focusAmount * 0.035;
    }

    function renderScene(activeRenderer = renderer) {
      if (activeRenderer === renderer && state.focusBlur) {
        composer.render();
        return;
      }
      activeRenderer.render(scene, camera);
    }

    function downloadDataURL(dataURL, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataURL;
      link.click();
    }

    function downloadText(text, filename, type = 'application/json') {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      downloadDataURL(url, filename);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function exportParameters() {
      const payload = {
        app: 'Glass Plate Array',
        version: 1,
        savedAt: new Date().toISOString(),
        state: { ...state }
      };
      downloadText(JSON.stringify(payload, null, 2), `glass-parameters-${Date.now()}.json`);
    }

    function sanitizeImportedState(nextState) {
      const allowedLayouts = ['line', 'ring', 'coil', 'spiral'];
      const allowedShapes = ['disc', 'roundedRect'];
      const allowedMaterials = ['solid gloss', 'glass', 'chrome'];
      const allowedCameraPresets = ['front', 'top', 'side', 'isometric', 'perspective', 'custom'];
      const allowedGradientDirections = ['horizontal', 'horizontal reverse', 'vertical', 'vertical reverse', 'diagonal', 'diagonal reverse'];
      const allowedFacing = ['tangent', 'same direction', 'inward', 'outward'];
      const allowedLineWaveStyles = ['flow', 'lift'];
      const allowedCanvasSizes = [...canvasSizeOptions];
      const allowedExportScales = ['1x', '2x', '3x', '4x'];
      if (!allowedLayouts.includes(nextState.layout)) nextState.layout = 'ring';
      if (!allowedShapes.includes(nextState.shape)) nextState.shape = 'disc';
      if (!allowedMaterials.includes(nextState.materialStyle)) nextState.materialStyle = 'glass';
      if (!allowedCameraPresets.includes(nextState.cameraPreset)) nextState.cameraPreset = 'perspective';
      if (!allowedGradientDirections.includes(nextState.panelGradientDirection)) nextState.panelGradientDirection = 'diagonal';
      if (!allowedFacing.includes(nextState.layoutFacing)) nextState.layoutFacing = 'tangent';
      if (!allowedLineWaveStyles.includes(nextState.lineWaveStyle)) nextState.lineWaveStyle = 'flow';
      if (!allowedCanvasSizes.includes(nextState.canvasSize)) nextState.canvasSize = '16:9 Widescreen';
      if (!Number.isFinite(nextState.canvasWidth)) nextState.canvasWidth = canvasPresets[nextState.canvasSize]?.[0] || 1920;
      if (!Number.isFinite(nextState.canvasHeight)) nextState.canvasHeight = canvasPresets[nextState.canvasSize]?.[1] || 1080;
      if (nextState.canvasSize !== 'Custom' && canvasPresets[nextState.canvasSize]) {
        [nextState.canvasWidth, nextState.canvasHeight] = canvasPresets[nextState.canvasSize];
      }
      nextState.canvasWidth = THREE.MathUtils.clamp(Math.round(nextState.canvasWidth), 320, 4096);
      nextState.canvasHeight = THREE.MathUtils.clamp(Math.round(nextState.canvasHeight), 320, 4096);
      nextState.backgroundSaturation = THREE.MathUtils.clamp(Number(nextState.backgroundSaturation), 0, 2);
      nextState.objectSaturation = THREE.MathUtils.clamp(Number(nextState.objectSaturation), 0, 2);
      if (!Number.isFinite(nextState.backgroundSaturation)) nextState.backgroundSaturation = 1;
      if (!Number.isFinite(nextState.objectSaturation)) nextState.objectSaturation = 1;
      if (!allowedExportScales.includes(nextState.exportScale)) nextState.exportScale = '1x';
      ['backgroundColor', 'objectColor', 'panelGradientColor', 'toneShadowColor', 'toneMidColor', 'toneHighlightColor'].forEach((key) => {
        nextState[key] = normalizeHex(nextState[key]) || state[key];
      });
    }

    function applyImportedState(importedState) {
      Object.keys(importedState).forEach((key) => {
        if (!(key in state)) return;
        const currentType = typeof state[key];
        if (typeof importedState[key] === currentType) state[key] = importedState[key];
      });
      sanitizeImportedState(state);
      syncUI();
      applyTheme();
      applyLook();
      applyLayoutAxis();
      rebuildItems();
      resize();
      updateFocusBlur();
      moveCamera(state.cameraPreset, false);
      refreshConditionalUI();
    }

    function importParameters() {
      parameterFileInput.value = '';
      parameterFileInput.click();
    }

    parameterFileInput.addEventListener('change', () => {
      const file = parameterFileInput.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener('load', () => {
        try {
          const parsed = JSON.parse(String(reader.result || '{}'));
          const importedState = parsed.state && typeof parsed.state === 'object' ? parsed.state : parsed;
          applyImportedState(importedState);
        } catch (error) {
          window.alert('Could not import this parameter file.');
        }
      });
      reader.readAsText(file);
    });

    function withExportRenderSize(callback) {
      const { width, height } = exportDimensions();
      const oldPixelRatio = renderer.getPixelRatio();
      renderer.setPixelRatio(1);
      renderer.setSize(width, height, false);
      composer.setSize(width, height);
      camera.aspect = width / Math.max(1, height);
      updateCameraProjection();
      const result = callback(width, height);
      renderer.setPixelRatio(oldPixelRatio);
      resize();
      return result;
    }

    function renderStill({ transparent = false } = {}) {
      const wasVisible = backdropMesh.visible;
      const oldBackground = scene.background;
      const oldClearAlpha = renderer.getClearAlpha();
      const oldClearColor = new THREE.Color();
      renderer.getClearColor(oldClearColor);
      const dataURL = withExportRenderSize(() => {
        if (transparent) {
          backdropMesh.visible = false;
          scene.background = null;
          renderer.setClearColor(0x000000, 0);
        }
        updateChromeReflections(renderer);
        renderScene(renderer);
        return renderer.domElement.toDataURL(transparent ? 'image/png' : 'image/jpeg', transparent ? 1 : 0.94);
      });
      backdropMesh.visible = wasVisible;
      scene.background = oldBackground;
      renderer.setClearColor(oldClearColor, oldClearAlpha);
      renderScene(renderer);
      return dataURL;
    }

    function exportJPG() {
      const { width, height } = exportDimensions();
      downloadDataURL(renderStill(), `glass-plates-${width}x${height}-${Date.now()}.jpg`);
    }

    function exportPNGObject() {
      const { width, height } = exportDimensions();
      downloadDataURL(renderStill({ transparent: true }), `glass-plates-object-${width}x${height}-${Date.now()}.png`);
    }

    function setRecordingUI(isRecording, secondsLeft = state.videoDuration) {
      if (!recordButton) return;
      recordButton.disabled = isRecording;
      recordButton.classList.toggle('is-recording', isRecording);
      recordButton.textContent = isRecording ? `Recording ${Math.max(0, secondsLeft)}s...` : 'Record video';
    }

    function recordVideo() {
      if (recordButton?.disabled) return;
      if (!HTMLCanvasElement.prototype.captureStream || typeof MediaRecorder === 'undefined') {
        window.alert('Video recording is not available in this browser.');
        return;
      }
      const mimeTypes = [
        'video/mp4;codecs="avc1.42E01E"',
        'video/mp4;codecs=h264',
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      const mimeType = mimeTypes.find((type) => MediaRecorder.isTypeSupported(type));
      if (!mimeType) {
        window.alert('This browser does not support MP4/WebM recording.');
        return;
      }
      const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
      const durationSeconds = Math.max(1, Math.round(state.videoDuration));
      const { width, height } = exportDimensions();
      const recordCanvas = document.createElement('canvas');
      const recordRenderer = new THREE.WebGLRenderer({
        canvas: recordCanvas,
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: false
      });
      recordRenderer.outputColorSpace = THREE.SRGBColorSpace;
      recordRenderer.toneMapping = renderer.toneMapping;
      recordRenderer.toneMappingExposure = renderer.toneMappingExposure;
      recordRenderer.setPixelRatio(1);
      recordRenderer.setSize(width, height, false);
      const recordCamera = camera.clone();
      let recordActive = true;
      const renderRecordFrame = () => {
        if (!recordActive) return;
        recordCamera.position.copy(camera.position);
        recordCamera.quaternion.copy(camera.quaternion);
        recordCamera.up.copy(camera.up);
        recordCamera.fov = camera.fov;
        recordCamera.near = camera.near;
        recordCamera.far = camera.far;
        recordCamera.aspect = width / Math.max(1, height);
        recordCamera.updateProjectionMatrix();
        updateChromeReflections(recordRenderer);
        recordRenderer.render(scene, recordCamera);
        requestAnimationFrame(renderRecordFrame);
      };
      renderRecordFrame();
      const stream = recordCanvas.captureStream(state.videoFps);
      const chunks = [];
      const recorder = new MediaRecorder(stream, {
        mimeType,
        videoBitsPerSecond: state.videoBitrate * 1000 * 1000
      });
      recorder.ondataavailable = (event) => {
        if (event.data.size) chunks.push(event.data);
      };
      recorder.onstop = () => {
        window.clearInterval(recordingTimer);
        recordingTimer = null;
        setRecordingUI(false);
        recordActive = false;
        stream.getTracks().forEach((track) => track.stop());
        recordRenderer.dispose();
        const blob = new Blob(chunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        downloadDataURL(url, `glass-plates-${width}x${height}-${Date.now()}.${extension}`);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };
      if (extension !== 'mp4') {
        window.alert('MP4 recording is not supported in this browser, so this export will be WebM.');
      }
      let secondsLeft = durationSeconds;
      setRecordingUI(true, secondsLeft);
      recordingTimer = window.setInterval(() => {
        secondsLeft -= 1;
        setRecordingUI(true, secondsLeft);
      }, 1000);
      recorder.start(250);
      setTimeout(() => recorder.stop(), durationSeconds * 1000);
    }

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;
      if (state.motion && state.groupRotate && state.layout !== 'line' && state.layout !== 'coil') {
        if (state.groupRotateMode === 'world axis') {
          masterGroup.rotation.y += state.groupSpeed * dt;
        } else {
          orbitGroup.rotation.y += state.groupSpeed * dt;
        }
      }
      items.forEach((item, i) => {
        if (state.layout === 'line' && state.motion) {
          applyLineWave(item, i, elapsed * state.lineWaveSpeed);
        }
        if (state.layout === 'coil' && state.motion) {
          applyCoilFlow(item, i, elapsed * state.coilFlowSpeed * 0.08);
        }
        const phase = state.selfSpinTiming === 'cascade' ? i * state.selfSpinOffset : 0;
        const baseX = THREE.MathUtils.degToRad(state.shapeRotX);
        const baseY = THREE.MathUtils.degToRad(state.shapeRotY);
        const baseZ = THREE.MathUtils.degToRad(state.shapeRotZ);
        item.pivot.rotation.order = 'YXZ';
        item.pivot.rotation.x = baseX + (state.motion && state.selfSpin ? Math.sin(elapsed * 0.35 + phase) * 0.08 : 0);
        item.pivot.rotation.y = baseY + (state.motion && state.selfSpin ? elapsed * state.selfSpeed + phase : 0);
        item.pivot.rotation.z = baseZ;
      });
      updateCameraTween(dt);
      controls.update();
      updateChromeReflections(renderer);
      renderScene(renderer);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
      if (!colorPickerModal.classList.contains('is-hidden')) ensurePickerInView();
    });
    buildUI();
    const setExportDrawer = (open) => {
      exportDrawer.classList.toggle('is-open', open);
      exportDrawer.setAttribute('aria-hidden', String(!open));
      exportToggle.setAttribute('aria-expanded', String(open));
    };
    exportToggle.addEventListener('click', () => {
      setExportDrawer(!exportDrawer.classList.contains('is-open'));
    });
    exportClose.addEventListener('click', () => setExportDrawer(false));
    themeToggle.addEventListener('click', () => {
      state.lightUI = !state.lightUI;
      applyTheme();
    });
    applyTheme();
    refreshConditionalUI();
    updateExportSummary();
    applyLook();
    rebuildItems();
    resize();
    updateFocusBlur();
    moveCamera(state.cameraPreset, false);
    animate();
  </script>
</body>
</html>
